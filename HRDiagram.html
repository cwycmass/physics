<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Meta tags optimized for a mobile app-like experience (no zooming) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>赫羅圖｜HR Diagram</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Strict lock on HTML and Body to prevent any native scrolling/bouncing on iOS */
        html, body {
            background-color: #0b0f19;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            overscroll-behavior: none; 
        }
        
        /* App container uses dynamic viewport height (dvh) to account for iOS Chrome/Safari address bars */
        #app-container {
            height: 100%;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
        }

        /* Prevent touch gestures from reloading the page on canvas */
        canvas {
            display: block;
            touch-action: none; 
        }
        
        /* Utility class for glowing titles */
        .glow-text {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        /* Gradient background for the sidebar */
        .sidebar {
            background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
        }
        
        /* Custom scrollbar styling for the sidebar to match the dark theme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>

    <!-- Main Application Wrapper -->
    <div id="app-container" class="relative z-0">
        <!-- Flex container: Column on mobile (Canvas top, Sidebar bottom), Row on Desktop (Canvas left, Sidebar right) -->
        <div class="flex flex-col md:flex-row flex-1 min-h-0 w-full">

            <!-- CANVAS AREA (Left/Top)                     -->

                    </div>
                </div>

                <!-- Axis Labels overlaying the canvas -->
                <div class="absolute bottom-2 md:bottom-4 left-0 right-0 flex justify-center pointer-events-none opacity-50">
                    <span id="label-temp-axis" class="text-[10px] md:text-xs uppercase tracking-[0.2em] md:tracking-[0.3em]">← 表面溫度 (K)</span>
                </div>
                <div class="absolute top-1/2 left-2 md:left-4 -translate-y-1/2 -rotate-90 pointer-events-none opacity-50 origin-left">
                    <span id="label-lum-axis" class="text-[10px] md:text-xs uppercase tracking-[0.2em] md:tracking-[0.3em]">光度 (<i>L</i>/<i>L</i><sub>⊙</sub>) →</span>
                </div>
            </div>

            <!-- ========================================== -->
            <!-- SIDEBAR CONTROL PANEL (Right/Bottom)       -->
            <!-- ========================================== -->
            <!-- Takes the remaining 55% on mobile, fixed 384px (w-96) width on desktop -->
            <div class="sidebar w-full md:w-96 h-[55%] md:h-full flex flex-col shrink-0 z-20 overflow-y-auto border-t border-slate-700 md:border-t-0 md:border-l">
                
                <!-- Header: Title and Buttons -->
                <div class="p-3 md:p-4 pb-2 border-b border-slate-700 flex justify-between items-start shrink-0">
                    <div class="min-w-0 flex-1 pr-4">
                        <!-- Allowed to wrap naturally instead of truncating, preventing text being blocked -->
                        <h1 id="ui-title" class="text-lg sm:text-xl md:text-2xl font-bold text-white mb-1 glow-text leading-tight">赫羅圖｜HR Diagram</h1>
                        <p id="ui-desc" class="text-[10px] md:text-xs text-slate-400 mt-1 leading-snug">在圖表上拖曳發光的恆星以探索其屬性。</p>

                    <!-- Action Buttons pushed to the top right corner -->

                            說明
                        </button>
                        <button onclick="toggleLang()" class="px-2 py-1 md:px-3 md:py-1 bg-slate-700 hover:bg-slate-600 rounded text-[10px] md:text-xs font-semibold text-white transition-colors border border-slate-500 shadow-sm">
                            繁/Eng
                        </button>
                    </div>
                </div>

                <!-- Scrollable Control Content -->
                <div class="p-2 md:p-4 pt-2 flex-1 flex flex-col gap-2 md:gap-4 min-h-0">
                    
                    <!-- 1. View Options (Toggles) -->
                    <div class="bg-slate-800/50 rounded-lg p-2 md:p-3 border border-slate-700 shadow-inner flex flex-col gap-2 shrink-0">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="zone-toggle" class="w-4 h-4 rounded bg-slate-900 border-slate-600 text-blue-500 focus:ring-blue-500/50 focus:ring-offset-slate-800 cursor-pointer" onchange="toggleZones(event)">
                            <label id="ui-show-zones" for="zone-toggle" class="text-xs md:text-sm text-slate-300 cursor-pointer select-none">顯示恆星區域與太陽位置</label>

    <!-- ========================================== -->
    <!-- EDUCATIONAL INFO MODAL                     -->
    <!-- ========================================== -->
    <!-- Placed safely outside the app container to ensure flawless stacking order -->
    <div id="info-modal" class="fixed inset-0 z-[9999] hidden bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-xl border border-slate-600 shadow-2xl max-w-lg w-full max-h-[80vh] flex flex-col break-words">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center shrink-0">

    <!-- ========================================== -->
    <!-- APPLICATION LOGIC (JavaScript)             -->
    <!-- ========================================== -->
    <script>

        const canvas = document.getElementById('hr-canvas');
        // REMOVED { alpha: false } to fix hardware compositing layer bugs on iOS/Safari which caused canvas to render above modals
        const ctx = canvas.getContext('2d'); 
        
        // Diagram Mathematical Boundaries (Logarithmic scales)
        // Temperature on the X axis decreases left-to-right (40,000K to 2,500K)
        const LOG_T_MAX = Math.log10(40000); // 40,000 K (O class)
        const LOG_T_MIN = Math.log10(2500);  // 2,500 K (M class)
        // Luminosity on the Y axis increases bottom-to-top (0.0001 to 1,000,000 Solar Lums)
        const LOG_L_MAX = 6.0;               // 10^6 L_sun
        const LOG_L_MIN = -4.0;              // 10^-4 L_sun
        const SUN_TEMP = 5778;               // Reference Temp for Sun

        // App State
        let width, height;
        let catalogueStars = []; // Holds the fetched/simulated background stars
        let isDragging = false;
        let showZones = false;
        let showIsoradius = false; // New state for isoradius lines
        let currentLang = 'zh';

        // Famous Stars Data Array for the Dropdown menu
        // Includes temperature (T), luminosity (L), and apparent magnitude (vmag)

            { id: "sun", T: 5778, L: 1.0, vmag: -26.74 },

            { id: "capella", T: 4970, L: 78.7, vmag: 0.08 },
            { id: "rigel", T: 12100, L: 120000, vmag: 0.13 },
            { id: "procyon", T: 6530, L: 6.93, vmag: 0.34 },
            { id: "achernar", T: 15000, L: 3150, vmag: 0.46 },
            { id: "betelgeuse", T: 3600, L: 126000, vmag: 0.50 }
        ];
        
        // The Interactive Target Star (Defaulted to match the Sun initially)
        let activeStar = {
            T: SUN_TEMP,
            L: 1.0,
            x: 0,
            y: 0,
            radius: 8, // Fixed hit/draw radius on canvas
            color: '#ffffff'
        };

        // --- 2. Internationalization (i18n) Data ---
        const i18n = {
            zh: {
                title: "赫羅圖",
                desc: "在圖表上拖曳發光的恆星以探索其屬性。",
                activeProps: "當前恆星屬性",
                temp: "表面溫度",
                lum: "光度",
                rad: "半徑",
                specClass: "光譜型",
                sizeComp: "大小比較",
                sun: "太陽",
                scaleWarn: "恆星太大，無法完全顯示",
                loading: "正在從 VizieR API 獲取 Hipparcos 星表...",
                tempAxis: "← 表面溫度 (K)",
                lumAxis: "光度 (<i>L</i>/<i>L</i><sub>⊙</sub>) →",
                showZones: "顯示恆星區域與太陽位置",
                showIsoradius: "顯示等半徑線",
                zoneMS: "主序星",
                zoneGiants: "紅巨星",
                zoneSuper: "超巨星",
                zoneWD: "白矮星",
                footer: "廠商會中學 · 物理科",
                btnInfo: "說明",
                modalTitle: "赫羅圖物理學原理",
                starTarget: "目標恆星",
                jumpToStar: "跳轉至夜空最亮恆星 (視星等)",
                selectStar: "-- 選擇恆星 --",
                starHint: "提示：在夜空中看起來很亮的恆星，其絕對光度不一定很高！（例如：天狼星、半人馬座α星的光度其實很低，只是離我們很近）",
                star_sun: "太陽",
                star_sirius: "天狼星",
                star_canopus: "老人星",
                star_alpha_cen: "半人馬座α星",
                star_arcturus: "大角星",
                star_vega: "織女星",
                star_capella: "五車二",
                star_rigel: "參宿七",
                star_procyon: "南河三",
                star_achernar: "水委一",
                star_betelgeuse: "參宿四",
                modalBody: `
                    <p>赫羅圖顯示了恆星的<strong>光度</strong>與其<strong>表面溫度</strong>之間的關係。</p>
                    <ul class="list-disc pl-5 space-y-2">
                        <li><strong class="text-white">主序星：</strong>恆星生命週期中最長、最穩定的階段，核心進行氫核聚變。太陽目前正處於此階段。</li>
                        <li><strong class="text-white">紅巨星 / 超巨星：</strong>恆星的晚期階段。體積膨脹導致表面冷卻（偏紅），但因表面積巨大，總光度極高。</li>

            },

                footer: "CMA Secondary School · Physics Department",
                btnInfo: "Info",
                modalTitle: "Physics of the HR Diagram",
                starTarget: "Target Star",
                jumpToStar: "Jump to Brightest Stars (Apparent Mag.)",
                selectStar: "-- Select a Star --",
                starHint: "Hint: A star that appears bright in the night sky doesn't necessarily have high intrinsic luminosity! (e.g., Sirius and Alpha Centauri have low luminosity but are just very close to Earth)",

                star_canopus: "Canopus",

                star_achernar: "Achernar",
                star_betelgeuse: "Betelgeuse",
                modalBody: `
                    <p>The Hertzsprung-Russell Diagram plots a star's <strong>Luminosity</strong> against its <strong>Surface Temperature</strong>.</p>
                    <ul class="list-disc pl-5 space-y-2">
                        <li><strong class="text-white">Main Sequence:</strong> The longest, stable phase of a star's life where hydrogen fusion occurs in its core. The Sun is a main sequence star.</li>
                        <li><strong class="text-white">Red Giants / Supergiants:</strong> Late stages of stellar evolution. Expanded outer layers cause surface cooling (reddish), but the massive surface area results in high overall luminosity.</li>
                        <li><strong class="text-white">White Dwarfs:</strong> The remnants of low-to-medium mass stars. No nuclear fusion occurs. They are Earth-sized, meaning they have low luminosity despite being very hot.</li>
                    </ul>
                    <div class="bg-slate-900 p-3 rounded mt-2 border border-slate-700">
                        <p class="font-semibold text-blue-300 mb-1">Stefan-Boltzmann Law:</p>
                        <p class="text-center font-mono text-lg text-white my-2"><i>L</i> = 4π<i>R</i>²σ<i>T</i>⁴</p>
                        <p class="text-xs text-slate-400">This law explains why at a given temperature (<i>T</i>), a highly luminous star (<i>L</i>) must have a massive radius (<i>R</i>).</p>

        // --- 3. Astrometric Math Functions ---
        
        // Map Temperature (Kelvin) to Canvas X Coordinate.
        // Uses inverse Log10 mapping since HR diagrams place hotter stars on the left.
        function tempToX(t) {
            const logT = Math.log10(Math.max(1, t));
            const progress = (LOG_T_MAX - logT) / (LOG_T_MAX - LOG_T_MIN);
            return progress * width;
        }

        // Map Canvas X Coordinate back to Temperature (Kelvin).
        function xToTemp(x) {
            const progress = x / width;
            const logT = LOG_T_MAX - (progress * (LOG_T_MAX - LOG_T_MIN));
            return Math.pow(10, logT);
        }

        // Map Luminosity (Solar units) to Canvas Y Coordinate.
        // Uses inverse Log10 mapping (brightest at the top, y=0).
        function lumToY(l) {
            const logL = Math.log10(Math.max(1e-10, l));
            const progress = (LOG_L_MAX - logL) / (LOG_L_MAX - LOG_L_MIN);
            return progress * height;
        }

        // Map Canvas Y Coordinate back to Luminosity (Solar units).
        function yToLum(y) {
            const progress = y / height;
            const logL = LOG_L_MAX - (progress * (LOG_L_MAX - LOG_L_MIN));
            return Math.pow(10, logL);
        }

        // Calculate Stellar Radius using the Stefan-Boltzmann law relation: L ∝ R^2 * T^4
        // Rearranged to output Radius relative to our Sun (R_sun = 1.0)
        function calculateRadius(t, l) {
            const tRatio = t / SUN_TEMP;
            return Math.sqrt(l) / Math.pow(tRatio, 2);
        }

        // Determine Morgan-Keenan Spectral Classification based strictly on surface temperature.
        function getSpectralClass(t) {
            if (t >= 30000) return 'O';
            if (t >= 10000) return 'B';
            if (t >= 7500) return 'A';
            if (t >= 6000) return 'F';
            if (t >= 5200) return 'G';
            if (t >= 3700) return 'K';
            return 'M';
        }

        // Convert Kelvin temperature to an RGB color string.
        // Based on Tanner Helland's color approximation algorithm for blackbody radiation.
        function kelvinToRGB(temp) {
            let t = Math.max(1000, Math.min(40000, temp)) / 100;
            let r, g, b;

            // Calculate Red component
            if (t <= 66) { r = 255; } 
            else {
                r = t - 60;
                r = 329.698727446 * Math.pow(r, -0.1332047592);
            }

            // Calculate Green component
            if (t <= 66) {
                g = t;
                g = 99.4708025861 * Math.log(g) - 161.1195681661;
            } else {
                g = t - 60;
                g = 288.1221695283 * Math.pow(g, -0.0755148492);
            }

            // Calculate Blue component
            if (t >= 66) { b = 255; } 
            else if (t <= 19) { b = 0; } 
            else {
                b = t - 10;
                b = 138.5177312231 * Math.log(b) - 305.0447927307;
            }

            // Clamp values between 0 and 255
            r = Math.max(0, Math.min(255, r));
            g = Math.max(0, Math.min(255, g));
            b = Math.max(0, Math.min(255, b));

            return `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`;
        }

        // --- 4. Data Processing (API Fetching) ---

        // Fetches real astronomical data from the Hipparcos catalog via the CDS VizieR API.
        async function fetchStarCatalogue() {
            try {
                // Fetch top 2500 brightest stars (Vmag), including B-V color index and Parallax (Plx).
                const response = await fetch('https://vizier.cds.unistra.fr/viz-bin/asu-tsv?-source=I/239/hip_main&-out=Vmag,B-V,Plx&-out.max=2500&-sort=Vmag', {
                    signal: AbortSignal.timeout(5000) // 5s timeout to prevent hanging
                });
                
                if (!response.ok) throw new Error("Network response was not ok");
                
                const text = await response.text();
                const lines = text.split('\n');
                catalogueStars = [];
                
                for (const line of lines) {
                    // Skip comments and empty lines in the TSV
                    if (line.startsWith('#') || line.trim() === '') continue;
                    
                    const cols = line.split('\t').map(c => c.trim());
                    const vmag = parseFloat(cols[0]); // Apparent magnitude
                    const bv = parseFloat(cols[1]);   // B-V Color index
                    const plx = parseFloat(cols[2]);  // Parallax in milliarcseconds
                    
                    if (!isNaN(vmag) && !isNaN(bv) && !isNaN(plx) && plx > 0) {
                        // Calculate Distance in parsecs: d = 1000 / Plx(mas)
                        const distance = 1000 / plx;
                        
                        // Absolute Magnitude (M): M = m - 5*log10(d) + 5
                        const absMag = vmag - 5 * Math.log10(distance) + 5;
                        
                        // Luminosity in Solar units: L = 10^((M_sun - M_star) / 2.5) 
                        // Note: Absolute magnitude of Sun is ~4.83
                        const L = Math.pow(10, (4.83 - absMag) / 2.5);
                        
                        // Temperature (Ballesteros' formula using B-V index)
                        const T = 4600 * (1 / (0.92 * bv + 1.7) + 1 / (0.92 * bv + 0.62));
                        
                        // Filter out extreme outliers to keep the diagram clean
                        if (T > 2000 && T < 50000 && L > 0.00001 && L < 1000000) {
                            catalogueStars.push({ T: T, L: L, color: kelvinToRGB(T) });
                        }
                    }
                }

                if (catalogueStars.length === 0) throw new Error("Parsed data empty");
                
            } catch (error) {
                console.warn("Could not fetch VizieR data, falling back to simulated data.", error);
                // Fallback to mathematically generated data if the API fails or is offline
                generateSimulatedCatalogue();
            } finally {
                // Remove loading spinner
                document.getElementById('loading-indicator').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-indicator').style.display = 'none', 300);
                draw(); // Render the canvas
            }
        }

        // Generates a mathematically approximate distribution of HR diagram stars 
        // in case the live API data fails to load.
        function generateSimulatedCatalogue() {
            catalogueStars = [];
            const numStars = 2000;

            for (let i = 0; i < numStars; i++) {
                let T, L;
                const rand = Math.random();

                if (rand < 0.85) {
                    // Main Sequence (85% of stars)
                    // log L ≈ 5.5 * log(T/T_sun) with random scatter
                    const logT = LOG_T_MIN + (Math.random() * (LOG_T_MAX - LOG_T_MIN));
                    T = Math.pow(10, logT);
                    const baseLogL = 5.5 * Math.log10(T / SUN_TEMP);
                    const scatterLogL = baseLogL + (Math.random() * 1.5 - 0.75);
                    L = Math.pow(10, scatterLogL);
                } else if (rand < 0.95) {
                    // Red Giants (10%)
                    T = 3000 + Math.random() * 2500;
                    L = 50 + Math.random() * 1000;
                } else {
                    // White Dwarfs (5%)
                    T = 8000 + Math.random() * 20000;
                    L = 0.0001 + Math.random() * 0.01;
                }

                // Push to array if within bounds
                if (L > Math.pow(10, LOG_L_MIN) && L < Math.pow(10, LOG_L_MAX)) {
                     catalogueStars.push({ T, L, color: kelvinToRGB(T) });
                }
            }
        }

        // --- 5. Canvas Rendering Logic ---

        // Resizes the canvas context to match physical CSS dimensions, taking 
        // high-DPI (Retina) displays into account to prevent blurriness.
        function resize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            width = canvas.width;
            height = canvas.height;
            ctx.scale(dpr, dpr);
            width /= dpr;
            height /= dpr;
            
            // Re-sync active star position after resize
            activeStar.x = tempToX(activeStar.T);
            activeStar.y = lumToY(activeStar.L);
            draw();
        }

        // Draws the Spectral Scale (OBAFGKM) and Color gradient bar at the top of the canvas
        function drawSpectralScale() {
            const barHeight = width < 400 ? 6 : 10;
            
            // Linear gradient representing surface temperature
            const grad = ctx.createLinearGradient(0, 0, width, 0);
            for (let i = 0; i <= 1; i += 0.05) {
                grad.addColorStop(i, kelvinToRGB(xToTemp(i * width)));
            }
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, barHeight);

            // Spectral class markers placed roughly at the center of their temperature ranges
            const classes = [
                { letter: 'O', t: 34641 },
                { letter: 'B', t: 17320 },
                { letter: 'A', t: 8660 },
                { letter: 'F', t: 6708 },
                { letter: 'G', t: 5585 },
                { letter: 'K', t: 4386 },
                { letter: 'M', t: 3041 }
            ];
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.font = width < 400 ? 'bold 10px sans-serif' : 'bold 14px sans-serif';
            ctx.fillStyle = '#94a3b8'; // slate-400
            
            classes.forEach(c => {
                const x = tempToX(c.t);
                ctx.fillText(c.letter, x, barHeight + 4);
            });
        }

        // Draws the background grid (Temperature and Luminosity lines)
        function drawGrid() {
            ctx.strokeStyle = '#1e293b'; // slate-800
            ctx.lineWidth = 1;
            ctx.fillStyle = '#64748b'; // slate-500
            ctx.font = width < 400 ? '9px monospace' : '10px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            // Vertical lines (Temperature)
            const textYOffset = width < 400 ? 24 : 32; // Drop text below spectral bar
            const temps = [40000, 20000, 10000, 7500, 5000, 3000];
            temps.forEach(t => {
                const x = tempToX(t);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
                
                // Hide some labels on small screens to prevent overlap
                if (width > 400 || (t === 40000 || t === 10000 || t === 3000)) {
                    ctx.fillText(`${t} K`, x, textYOffset); 
                }
            });

            // Horizontal lines (Luminosity - log 10 scale)
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            for (let logL = LOG_L_MIN; logL <= LOG_L_MAX; logL += 2) {
                const l = Math.pow(10, logL);
                const y = lumToY(l);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
                
                const label = logL === 0 ? '1' : `10^${logL}`;
                ctx.fillText(`${label}`, 5, y - (width < 400 ? 5 : 8));
            }
        }

        // Draws the Isoradius lines (lines of constant stellar radius)
        function drawIsoradius() {
            if (!showIsoradius) return;
            ctx.save();
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.3)'; // slate-400 with transparency
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);

            // Powers of 10 for Solar Radii to display
            const radiuses = [0.0001, 0.001, 0.01, 0.1, 1, 10, 100, 1000, 10000];
            const superscripts = { '-': '⁻', '0': '⁰', '1': '¹', '2': '²', '3': '³', '4': '⁴', '5': '⁵', '6': '⁶', '7': '⁷', '8': '⁸', '9': '⁹' };
            
            // On a log-log HR diagram, lines of constant R are straight lines.
            // We evaluate them from T_MAX (left) to T_MIN (right).
            const T1 = Math.pow(10, LOG_T_MAX);
            const T2 = Math.pow(10, LOG_T_MIN);
            const x1 = tempToX(T1);
            const x2 = tempToX(T2);

            radiuses.forEach(r => {
                const L1 = r * r * Math.pow(T1 / SUN_TEMP, 4);
                const L2 = r * r * Math.pow(T2 / SUN_TEMP, 4);
                const y1 = lumToY(L1);
                const y2 = lumToY(L2);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();

                // Find a visible point along the line to place the label safely on screen
                let labelProgress = -1;
                for (let p = 0.15; p <= 0.85; p += 0.05) {
                    let testY = y1 + (y2 - y1) * p;
                    if (testY > 40 && testY < height - 40) {
                        labelProgress = p;
                        break;
                    }
                }

                if (labelProgress !== -1) {
                    const labelX = x1 + (x2 - x1) * labelProgress;
                    const labelY = y1 + (y2 - y1) * labelProgress;
                    // Calculate angle for text rotation to match the line slope
                    const angle = Math.atan2(y2 - y1, x2 - x1);

                    ctx.save();
                    ctx.translate(labelX, labelY);
                    ctx.rotate(angle);
                    
                    ctx.fillStyle = 'rgba(148, 163, 184, 0.9)'; // slate-400
                    ctx.font = '10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    
                    // Format text to 10^x using unicode superscripts for visual elegance
                    let rText = r === 1 ? '1' : '10' + String(Math.log10(r)).split('').map(c => superscripts[c] || c).join('');
                    ctx.fillText(`${rText} R⊙`, 0, -2);
                    ctx.restore();
                }
            });
            ctx.restore();
        }

        // Renders the highlighted evolutionary zones (if toggle is active)
        function drawZones() {
            if (!showZones) return;

            const t = i18n[currentLang];
            ctx.save();
            
            // 1. Draw Sun Reference lines and dot
            const sunX = tempToX(SUN_TEMP);
            const sunY = lumToY(1.0);
            ctx.strokeStyle = 'rgba(234, 179, 8, 0.6)'; // yellow-500
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(sunX, 0); ctx.lineTo(sunX, height);
            ctx.moveTo(0, sunY); ctx.lineTo(width, sunY);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = '#eab308';
            ctx.beginPath();
            ctx.arc(sunX, sunY, width < 400 ? 3 : 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.font = width < 400 ? '10px sans-serif' : '12px sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fde047';
            ctx.fillText(t.sun, sunX + 6, sunY - 8);

            // 2. Setup styles for the Zone labels
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const fontSize = width < 400 ? 12 : 14;
            ctx.font = `italic bold ${fontSize}px sans-serif`;

            // Helper function to draw high-contrast "pill" shaped labels for zones
            function drawPillLabel(text, x, y, textColor, rotation = 0) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                
                const paddingX = 10;
                const paddingY = 6;
                const textWidth = ctx.measureText(text).width;
                const textHeight = fontSize;
                
                // Dark pill background
                ctx.fillStyle = 'rgba(15, 23, 42, 0.95)'; 
                ctx.beginPath();
                if (ctx.roundRect) {
                    ctx.roundRect(-textWidth/2 - paddingX, -textHeight/2 - paddingY, textWidth + paddingX*2, textHeight + paddingY*2, 8);
                } else {
                    ctx.rect(-textWidth/2 - paddingX, -textHeight/2 - paddingY, textWidth + paddingX*2, textHeight + paddingY*2);
                }
                ctx.fill();
                
                // Pill colored border
                ctx.strokeStyle = textColor;
                ctx.lineWidth = 1.5; 
                ctx.globalAlpha = 0.8; 
                ctx.stroke();
                ctx.globalAlpha = 1.0;

                // Glowing text
                ctx.fillStyle = textColor;
                ctx.shadowColor = textColor;
                ctx.shadowBlur = 6;
                ctx.fillText(text, 0, 1); // +1px offsets perfectly for visual vertical centering
                
                ctx.restore();
            }

            // --- Draw Highlight Polygons/Ellipses ---
            
            // Main Sequence Band (Diagonal line with thick stroke)
            ctx.strokeStyle = 'rgba(100, 116, 139, 0.3)';
            ctx.beginPath();
            ctx.moveTo(tempToX(40000), lumToY(100000));
            ctx.lineTo(tempToX(20000), lumToY(1000));
            ctx.lineTo(tempToX(5778), lumToY(1));
            ctx.lineTo(tempToX(3000), lumToY(0.001));
            ctx.lineWidth = width < 400 ? 25 : 45;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            
            ctx.lineWidth = 1;

            // Red Giants (Ellipse)
            ctx.fillStyle = 'rgba(239, 68, 68, 0.1)'; 
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.3)';
            ctx.beginPath();
            ctx.ellipse(tempToX(4500), lumToY(100), Math.abs(tempToX(6000)-tempToX(3000))/2, Math.abs(lumToY(1000)-lumToY(10))/2, 0, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();

            // Supergiants (Ellipse)
            ctx.fillStyle = 'rgba(217, 119, 6, 0.1)'; 
            ctx.strokeStyle = 'rgba(217, 119, 6, 0.3)';
            ctx.beginPath();
            ctx.ellipse(tempToX(10000), lumToY(100000), Math.abs(tempToX(30000)-tempToX(3000))/2, Math.abs(lumToY(1000000)-lumToY(10000))/2, 0, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();

            // White Dwarfs (Ellipse)
            ctx.fillStyle = 'rgba(56, 189, 248, 0.1)'; 
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.3)';
            ctx.beginPath();
            ctx.ellipse(tempToX(20000), lumToY(0.001), Math.abs(tempToX(40000)-tempToX(8000))/2, Math.abs(lumToY(0.1)-lumToY(0.0001))/2, 0, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();

            // --- Render labels on top of everything ---
            drawPillLabel(t.zoneMS, tempToX(10000), lumToY(100), 'rgba(226, 232, 240, 1)', -Math.PI / 5.5);
            drawPillLabel(t.zoneGiants, tempToX(4500), lumToY(100), 'rgba(252, 165, 165, 1)');
            drawPillLabel(t.zoneSuper, tempToX(10000), lumToY(100000), 'rgba(253, 230, 138, 1)');
            drawPillLabel(t.zoneWD, tempToX(20000), lumToY(0.001), 'rgba(186, 230, 253, 1)');

            ctx.restore();
        }

        // Draws the actual points representing the background star catalogue
        function drawCatalogue() {
            for (const star of catalogueStars) {
                const x = tempToX(star.T);
                const y = lumToY(star.L);
                
                ctx.fillStyle = star.color;
                // Add tiny visual variance to radius based on Luminosity (purely for aesthetics)
                const maxR = width < 400 ? 1.5 : 2.5;
                const r = Math.max(0.5, Math.min(maxR, (Math.log10(star.L) - LOG_L_MIN) * 0.3));
                
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

        // Draws the interactive glowing target star that the user controls
        function drawActiveStar() {
            const x = activeStar.x;
            const y = activeStar.y;
            activeStar.color = kelvinToRGB(activeStar.T);
            
            // Calculate dynamic visual radius based on physical size (R)
            const R = calculateRadius(activeStar.T, activeStar.L);
            const logR = Math.log10(Math.max(0.0001, R));
            // Base radius is 8px (Sun, where logR = 0). 
            // Scales down to ~3px for White Dwarfs, and up to ~30px for Supergiants.
            activeStar.radius = Math.max(3, Math.min(30, 8 + logR * 6));

            // Outer glow radial gradient
            const gradient = ctx.createRadialGradient(x, y, activeStar.radius * 0.5, x, y, activeStar.radius * 4);
            gradient.addColorStop(0, activeStar.color);
            gradient.addColorStop(0.2, activeStar.color);
            gradient.addColorStop(1, 'transparent');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, activeStar.radius * 4, 0, Math.PI * 2);
            ctx.fill();

            // Solid core
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x, y, activeStar.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw Target Reticle outline
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 1;
            const retSize = activeStar.radius + 6;
            ctx.beginPath();
            ctx.moveTo(x - retSize, y); ctx.lineTo(x + retSize, y);
            ctx.moveTo(x, y - retSize); ctx.lineTo(x, y + retSize);
            ctx.stroke();
        }

        // Main render loop
        function draw() {
            // Prevent drawing before canvas is properly sized
            if (!width || !height) return;

            // Clear canvas
            ctx.fillStyle = '#0b0f19';
            ctx.fillRect(0, 0, width, height);

            // Render elements in depth order (Bottom to Top)
            drawSpectralScale();
            drawGrid();
            drawIsoradius();
            drawZones();
            drawCatalogue();
            drawActiveStar();
        }

        // --- 6. DOM & UI Updates ---

        // Helper to format physics values cleanly
        function formatNumber(num) {
            if (num < 0.01 || num > 9999) return num.toExponential(2);
            return num.toFixed(2);
        }

        // Updates all numerical text in the UI based on `activeStar` properties
        function updateStatsPanel() {
            const T = activeStar.T;
            const L = activeStar.L;
            const R = calculateRadius(T, L);
            const sClass = getSpectralClass(T);
            
            document.getElementById('stat-temp').innerText = Math.round(T).toLocaleString();
            document.getElementById('stat-lum').innerText = formatNumber(L);
            document.getElementById('stat-rad').innerText = formatNumber(R);
            
            const classEl = document.getElementById('stat-class');
            classEl.innerText = sClass;
            classEl.style.color = activeStar.color;

            // Update Visual Size comparison balls
            const visualStar = document.getElementById('visual-star');
            const visualSun = document.getElementById('visual-sun');
            const scaleWarning = document.getElementById('scale-warning');
            
            // Limit bounds to avoid breaking the CSS flexbox container
            const maxVisualRadius = window.innerWidth < 768 ? 18 : 36; 
            const baseSunRadius = window.innerWidth < 768 ? 4 : 6;
            
            let sunR = baseSunRadius;
            let starR = R * sunR;
            
            // Dynamic scaling logic: if the star is too big to fit, we scale the star down
            // to the maximum box size, and scale the Sun down proportionally.
            if (starR > maxVisualRadius) {
                starR = maxVisualRadius;
                sunR = starR / R; // Recalculate relative sun radius
                
                // If the sun drops below 1px, freeze it at 1px so it remains visible,
                // and break the true scale. Allow starR to freely expand past container!
                if (sunR < 1) {
                    sunR = 1;
                    starR = R * sunR; // Star is larger than maxVisualRadius now
                    scaleWarning.classList.remove('hidden');
                } else {
                    scaleWarning.classList.add('hidden');
                }
            } else {
                scaleWarning.classList.add('hidden');
            }

            visualSun.style.width = `${sunR * 2}px`;
            visualSun.style.height = `${sunR * 2}px`;

            visualStar.style.width = `${starR * 2}px`;
            visualStar.style.height = `${starR * 2}px`;
            visualStar.style.backgroundColor = activeStar.color;
        }

        // Populates the HTML <select> dropdown with famous stars array
        function populateStarDropdown() {
            const select = document.getElementById('star-select');
            const currentVal = select.value;
            
            // Add default empty option translated
            select.innerHTML = `<option value="">${i18n[currentLang].selectStar}</option>`;
            
            famousStars.forEach(star => {
                const opt = document.createElement('option');
                opt.value = star.id;
                
                // Format Apparent Magnitude (Vmag) e.g. "+0.50" or "-1.46"
                const magStr = star.vmag > 0 ? `+${star.vmag.toFixed(2)}` : star.vmag.toFixed(2);
                
                // Insert translated name and magnitude bracket
                opt.innerText = `${i18n[currentLang][`star_${star.id}`]} (${magStr})`;
                select.appendChild(opt);
            });
            
            // Retain user's current selection if language changes
            select.value = currentVal;
        }

        // Swaps all text elements to match the current dictionary logic (zh/en)
        function updateI18n() {
            const t = i18n[currentLang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-desc').innerText = t.desc;
            document.getElementById('ui-active-props').innerText = t.activeProps;
            document.getElementById('ui-temp').innerText = t.temp;
            document.getElementById('ui-lum').innerText = t.lum;
            document.getElementById('ui-rad').innerText = t.rad;
            document.getElementById('ui-class').innerText = t.specClass;
            document.getElementById('ui-size-comp').innerText = t.sizeComp;
            document.getElementById('ui-sun-label').innerText = t.sun;
            document.getElementById('scale-warning').innerText = t.scaleWarn;
            document.getElementById('ui-show-zones').innerText = t.showZones;
            document.getElementById('ui-show-isoradius').innerText = t.showIsoradius;
            document.getElementById('label-temp-axis').innerHTML = t.tempAxis;
            document.getElementById('label-lum-axis').innerHTML = t.lumAxis;
            document.getElementById('loading-text').innerText = t.loading;
            document.getElementById('ui-footer').innerText = t.footer;
            document.getElementById('ui-star-label').innerText = t.starTarget;
            document.getElementById('ui-jump-to').innerText = t.jumpToStar;
            document.getElementById('ui-star-hint').innerText = t.starHint;
            
            document.getElementById('btn-info').innerText = t.btnInfo;
            document.getElementById('modal-title').innerText = t.modalTitle;
            document.getElementById('modal-content').innerHTML = t.modalBody;
            
            populateStarDropdown();
            draw(); // Redraw canvas to update translated Zone labels
        }

        // --- 7. Event Handlers ---

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateI18n();
        }

        function toggleZones(e) {
            showZones = e.target.checked;
            draw();
        }

        function toggleIsoradius(e) {
            showIsoradius = e.target.checked;
            draw();
        }

        function openInfoModal() {
            document.getElementById('info-modal').classList.remove('hidden');
        }

        function closeInfoModal() {
            document.getElementById('info-modal').classList.add('hidden');
        }

        // Dropdown change event
        function jumpToStar() {
            const select = document.getElementById('star-select');
            const starId = select.value;
            if (!starId) return;

            const star = famousStars.find(s => s.id === starId);
            if (star) {
                // Update physics model
                activeStar.T = star.T;
                activeStar.L = star.L;
                
                // Recalculate canvas coordinates
                activeStar.x = tempToX(activeStar.T);
                activeStar.y = lumToY(activeStar.L);
                
                updateStatsPanel();
                draw();
            }
        }

        // Close modal when clicking on the dark background overlay
        document.getElementById('info-modal').addEventListener('click', function(e) {
            if (e.target === this) closeInfoModal();
        });

        // --- Pointer Event Logic (Mouse/Touch) ---
        function handlePointerDown(e) {
            const rect = canvas.getBoundingClientRect();
            // Normalize touch vs mouse
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const mouseX = clientX - rect.left;
            const mouseY = clientY - rect.top;

            // Check if user clicked within the interactive radius of the star
            const dist = Math.hypot(mouseX - activeStar.x, mouseY - activeStar.y);
            const hitThreshold = e.touches ? activeStar.radius * 6 + 20 : activeStar.radius * 5 + 10;
            
            if (dist < hitThreshold) { 
                isDragging = true;
                // Disconnect from the dropdown since user is taking manual control
                document.getElementById('star-select').value = "";
                e.preventDefault();
            }
        }

        function handlePointerMove(e) {
            if (!isDragging) return;
            
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Clamp coordinates to canvas bounds
            activeStar.x = Math.max(0, Math.min(width, clientX - rect.left));
            activeStar.y = Math.max(0, Math.min(height, clientY - rect.top));

            // Reverse calculate Physics properties based on dragged location
            activeStar.T = xToTemp(activeStar.x);
            activeStar.L = yToLum(activeStar.y);

            updateStatsPanel();
            requestAnimationFrame(draw); // Performant re-render
            e.preventDefault();
        }

        function handlePointerUp() {
            isDragging = false;
        }

        // Register Mouse events
        canvas.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);
        
        // Register Touch events (passive: false allows e.preventDefault() to stop screen scrolling)
        canvas.addEventListener('touchstart', handlePointerDown, {passive: false});
        window.addEventListener('touchmove', handlePointerMove, {passive: false});
        window.addEventListener('touchend', handlePointerUp);
        window.addEventListener('touchcancel', handlePointerUp);

        // Throttle resize events to prevent visual lag
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(resize, 100);
        });

        // --- 8. Initialization ---
        function init() {
            resize(); // Must be called first to define canvas width/height before drawing
            updateI18n();
            updateStatsPanel();
            fetchStarCatalogue(); // Start pulling external data
        }

        // Boot
        init();
    </script>
</body>
</html>
