          <button onclick="startGame(currentMode)" class="flex-[2] bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-bold text-lg py-4 rounded-2xl shadow-lg transform transition hover:scale-105 flex items-center justify-center gap-2 btn-bounce">

  <!-- ==================== JavaScript Game Logic ==================== -->
  <script>
    // --- Math Engine & Generators ---

    // Utility for fractions
    function gcd(a, b) {
      a = Math.abs(a);
      b = Math.abs(b);
      return b === 0 ? a : gcd(b, a % b);
    }

    class Frac {
      constructor(n, d) {
        if (d === 0) d = 1;
        let g = gcd(n, d);
        this.n = n / g;
        this.d = d / g;
        if (this.d < 0) {
          this.n *= -1;
          this.d *= -1;
        }
      }
      add(o) { return new Frac(this.n * o.d + o.n * this.d, this.d * o.d); }
      sub(o) { return new Frac(this.n * o.d - o.n * this.d, this.d * o.d); }
      mul(o) { return new Frac(this.n * o.n, this.d * o.d); }
      div(o) { return new Frac(this.n * o.d, this.d * o.n); }
      toDecimal() { return this.n / this.d; }
      toLatex() {
        if (this.d === 1) return `${this.n}`;
        if (this.n === 0) return `0`;
        if (this.n < 0) return `-\\frac{${Math.abs(this.n)}}{${this.d}}`;
        return `\\frac{${this.n}}{${this.d}}`;
      }
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function makeFriendlyFrac() {
      // Denominators include common 5th-grade friendly 1-digit and 2-digit benchmarks
      const denoms = [2, 3, 4, 5, 6, 8, 10, 12, 15, 20];
      const d = denoms[randInt(0, denoms.length - 1)];
      let n;
      if (d >= 10) {
        // For 2-digit denominators, keep numerators close to 'd' to preserve grade-level complexity
        n = randInt(1, d + 3); 
      } else {
        // For 1-digit denominators, occasionally introduce 2-digit numerators for mixed/improper feel
        n = Math.random() < 0.35 ? randInt(10, 15) : randInt(1, d + 2);
      }
      return new Frac(n, d);
    }

    function shuffleArray(array) {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    }

    function evalFrac(f1, op, f2) {
      if (op === '+') return f1.add(f2);
      if (op === '-') return f1.sub(f2);
      if (op === '\\times') return f1.mul(f2);
      if (op === '\\div') return f1.div(f2);
      return new Frac(0, 1);
    }

    function evalDec(a, op, b) {
      if (op === '+') return a + b;
      if (op === '-') return a - b;
      if (op === '\\times') return a * b;
      if (op === '\\div') return a / b;
      return 0;
    }

    // Ensures 4 strictly unique LaTeX string options
    function makeUniqueFractions(fracArr, correctFrac) {
      let seen = new Set();
      let result = [];
      let cLatex = correctFrac.toLatex();
      seen.add(cLatex);
      result.push(cLatex);

      for(let i = 1; i < 4; i++) {
        let temp = fracArr[i];
        let latex = temp.toLatex();
        let attempts = 0;
        while(seen.has(latex) && attempts < 20) {
          temp = new Frac(temp.n + randInt(1,3), temp.d + randInt(0,2));
          latex = temp.toLatex();
          attempts++;
        }
        seen.add(latex);
        result.push(latex);
      }
      return result;
    }

    function generateFractionSet(count) {
      let qs = [];
      const ops1 = ['+', '-'];
      const ops2 = ['\\times', '\\div'];
      
      for(let i = 0; i < count; i++) {
        let pattern = randInt(1, 3);
        let fA = makeFriendlyFrac();
        let fB = makeFriendlyFrac();
        let fC = makeFriendlyFrac();
        
        let op1, op2, qLatex, correct, d1, d2, d3;

        // Pattern 1: (A +/- B) *|/ C
        if (pattern === 1) {
            op1 = ops1[randInt(0, 1)];
            op2 = ops2[randInt(0, 1)];
            
            // Ensure A - B is positive for Grade 5 level
            if (op1 === '-' && fA.toDecimal() < fB.toDecimal()) [fA, fB] = [fB, fA];
            
            let part1 = evalFrac(fA, op1, fB);
            // Prevent division by zero
            if (op2 === '\\div' && fC.n === 0) fC = new Frac(1, 2); 
            
            correct = evalFrac(part1, op2, fC);
            qLatex = `\\left(${fA.toLatex()} ${op1} ${fB.toLatex()}\\right) ${op2} ${fC.toLatex()}`;
            
            // Distractor 1: Ignored Brackets (Calculated B *|/ C first)
            d1 = evalFrac(fA, op1, evalFrac(fB, op2, fC));
            // Distractor 2: Common additive denominator error on part 1
            let badPart1 = (op1 === '+') ? new Frac(fA.n + fB.n, fA.d + fB.d) : new Frac(Math.abs(fA.n - fB.n), fA.d + fB.d || 1);
            d2 = evalFrac(badPart1, op2, fC);
            // Distractor 3: Flipped the outer operator
            let badOp2 = op2 === '\\times' ? '\\div' : '\\times';
            d3 = evalFrac(part1, badOp2, fC);
            
        // Pattern 2: A *|/ (B +/- C)
        } else if (pattern === 2) {
            op1 = ops2[randInt(0, 1)];
            op2 = ops1[randInt(0, 1)];
            
            if (op2 === '-' && fB.toDecimal() < fC.toDecimal()) [fB, fC] = [fC, fB];
            
            let part2 = evalFrac(fB, op2, fC);
            if (part2.n === 0 && op1 === '\\div') part2 = new Frac(1, 2); 
            
            correct = evalFrac(fA, op1, part2);
            qLatex = `${fA.toLatex()} ${op1} \\left(${fB.toLatex()} ${op2} ${fC.toLatex()}\\right)`;
            
            // Distractor 1: Ignored Brackets (Calculated A *|/ B first)
            d1 = evalFrac(evalFrac(fA, op1, fB), op2, fC);
            // Distractor 2: Additive denominator error on part 2
            let badPart2 = (op2 === '+') ? new Frac(fB.n + fC.n, fB.d + fC.d) : new Frac(Math.abs(fB.n - fC.n), fB.d + fC.d || 1);
            if (badPart2.n === 0) badPart2 = new Frac(1, 3);
            d2 = evalFrac(fA, op1, badPart2);
            // Distractor 3: Minor calculation drift
            d3 = new Frac(correct.n + 1, correct.d);
            
        // Pattern 3: A +/- B *|/ C (Testing standard PEMDAS without brackets)
        } else {
            op1 = ops1[randInt(0, 1)];
            op2 = ops2[randInt(0, 1)];
            
            if (op2 === '\\div' && fC.n === 0) fC = new Frac(1, 2);
            let part2 = evalFrac(fB, op2, fC);
            
            // Ensure positive result if subtraction
            if (op1 === '-' && fA.toDecimal() < part2.toDecimal()) {
                fA = new Frac(part2.n * 2 + 1, part2.d); 
            }
            
            correct = evalFrac(fA, op1, part2);
            qLatex = `${fA.toLatex()} ${op1} ${fB.toLatex()} ${op2} ${fC.toLatex()}`;
            
            // Distractor 1: Ignored PEMDAS (Evaluated strict left-to-right)
            let badPart1 = evalFrac(fA, op1, fB);
            d1 = evalFrac(badPart1, op2, fC);
            // Distractor 2: Evaluated the addition/subtraction, but flipped division/multiplication
            d2 = evalFrac(evalFrac(fA, op2, fB), op1, fC);
            // Distractor 3: Denominator drift
            d3 = new Frac(correct.n, correct.d + 1);
        }

        let uniqueOpts = makeUniqueFractions([correct, d1, d2, d3], correct);
        let correctStr = uniqueOpts[0];
        let shuffled = shuffleArray([...uniqueOpts]);
        let correctIdx = shuffled.indexOf(correctStr);

        qs.push({ q: qLatex, options: shuffled, correct: correctIdx });
      }
      return qs;
    }

    function generateDecimalSet(count) {
      let qs = [];
      const ops1 = ['+', '-'];
      const fmt = (num) => parseFloat(num.toFixed(4));
      
      for(let i = 0; i < count; i++) {
        let pattern = randInt(1, 4);
        let op1 = ops1[randInt(0, 1)];
        let qLatex, correct, d1, d2, d3;

        // Pattern 1: (A +/- B) * C
        if (pattern === 1) {
            let A = randInt(10, 50) / 10; 
            let B = randInt(1, 40) / 10;
            if (op1 === '-' && A < B) [A, B] = [B, A];
            let C = randInt(2, 6);
            
            correct = fmt(evalDec(evalDec(A, op1, B), '\\times', C));
            qLatex = `\\left(${A} ${op1} ${B}\\right) \\times ${C}`;
            
            d1 = fmt(evalDec(A, op1, evalDec(B, '\\times', C))); // Ignored brackets
            d2 = fmt(correct * 10); // Decimal place shift error
            d3 = fmt(correct + 1.2); // Arithmetic drift
            
        // Pattern 2: A +/- B * C (PEMDAS check)
        } else if (pattern === 2) {
            let B = randInt(2, 9) / 10; 
            let C = randInt(2, 6); 
            let part2 = B * C;
            let A = randInt(Math.ceil(part2) * 10 + 10, Math.ceil(part2) * 10 + 50) / 10; 
            
            correct = fmt(evalDec(A, op1, part2));
            qLatex = `${A} ${op1} ${B} \\times ${C}`;
            
            d1 = fmt(evalDec(evalDec(A, op1, B), '\\times', C)); // Ignored PEMDAS (L->R)
            d2 = fmt(correct / 10); // Decimal shift error
            d3 = fmt(correct > 1 ? correct - 0.5 : correct + 0.5);
            
        // Pattern 3: A +/- B / C (Clean division backward generation)
        } else if (pattern === 3) {
            let C = [2, 4, 5, 8][randInt(0, 3)];
            let part2 = randInt(1, 9) / 10; // Clean decimal target
            let B = fmt(part2 * C);
            let A = randInt(Math.ceil(part2) * 10 + 10, Math.ceil(part2) * 10 + 50) / 10;
            
            correct = fmt(evalDec(A, op1, part2));
            qLatex = `${A} ${op1} ${B} \\div ${C}`;
            
            d1 = fmt(evalDec(evalDec(A, op1, B), '\\div', C)); // Ignored PEMDAS
            d2 = fmt(evalDec(A, op1, fmt(B * C))); // Multiplied instead of dividing
            d3 = fmt(correct + 0.2);
            
        // Pattern 4: (A +/- B) / C
        } else {
            let C = [2, 4, 5][randInt(0, 2)];
            let targetResult = randInt(1, 15) / 10;
            let sumVal = fmt(targetResult * C);
            
            let B = randInt(1, Math.floor(sumVal * 5)) / 10;
            let A = op1 === '+' ? fmt(sumVal - B) : fmt(sumVal + B);
            
            if (A < 0 || B < 0) { A = 5.5; B = 1.5; op1 = '-'; C = 2; targetResult = 2.0; } // Fallback

            correct = fmt(targetResult);
            qLatex = `\\left(${A} ${op1} ${B}\\right) \\div ${C}`;
            
            d1 = fmt(evalDec(A, op1, evalDec(B, '\\div', C))); // Ignored brackets
            d2 = fmt(evalDec(evalDec(A, op1, B), '\\times', C)); // Multiplied outer
            d3 = fmt(correct * 10);
        }

        // Ensure purely unique and non-negative distractors
        let opts = [correct, d1, d2, d3];
        let uniqueOpts = [];
        let seen = new Set();
        
        for (let j = 0; j < 4; j++) {
            let val = opts[j];
            let attempts = 0;
            while ((seen.has(val.toString()) || val < 0) && attempts < 20) {
                val = fmt(val + [0.1, 0.5, 1, 0.2][randInt(0, 3)]);
                attempts++;
            }
            seen.add(val.toString());
            uniqueOpts.push(val.toString());
        }

        let correctStr = uniqueOpts[0];
        let shuffled = shuffleArray([...uniqueOpts]);
        let correctIdx = shuffled.indexOf(correctStr);

        qs.push({ q: qLatex, options: shuffled, correct: correctIdx });
      }
      return qs;
    }

    // --- STREAMING_CHUNK:Audio Engine Setup ---
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    let soundEnabled = true;
    let bgmIntervalRef = null;
    let noteIdx = 0;
    const bgmNotes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63];

    function initAudio() {
      if (!actx) actx = new AudioCtx();
      if (actx.state === 'suspended') actx.resume();
    }

    function playTone(freq, type, duration, vol) {
      if (!actx || !soundEnabled) return;
      try {
        if (actx.state === 'suspended') actx.resume();
        const osc = actx.createOscillator();
        const gain = actx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, actx.currentTime);
        gain.gain.setValueAtTime(vol, actx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
        osc.connect(gain);
        gain.connect(actx.destination);
        osc.start();
        osc.stop(actx.currentTime + duration);
      } catch (e) {}
    }

    function playSFX(type) {
      if (!soundEnabled) return;
      initAudio();
      if (type === 'click') playTone(600, 'sine', 0.05, 0.05);
      if (type === 'correct') {
        playTone(523.25, 'sine', 0.1, 0.1);
        setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100);
        setTimeout(() => playTone(783.99, 'sine', 0.3, 0.1), 200);
      }
      if (type === 'wrong') {
        playTone(250, 'sawtooth', 0.3, 0.1);
        setTimeout(() => playTone(200, 'sawtooth', 0.4, 0.1), 200);
      }
      if (type === 'result') {
        [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => 
          setTimeout(() => playTone(f, 'square', 0.2, 0.1), i * 150)
        );
      }
    }

    function toggleSound() {
      initAudio();
      soundEnabled = !soundEnabled;
      const icon = document.getElementById('audio-icon');
      if (soundEnabled) {
        icon.className = "fa-solid fa-volume-high text-xl";
        if (currentMode && document.getElementById('playing-screen').classList.contains('flex')) {
          startBGM();
        }
      } else {
        icon.className = "fa-solid fa-volume-xmark text-xl";
        stopBGM();
      }
    }

    function startBGM() {
      stopBGM();
      if (!soundEnabled) return;
      initAudio();
      bgmIntervalRef = setInterval(() => {
        playTone(bgmNotes[noteIdx], 'triangle', 0.4, 0.02);
        noteIdx = (noteIdx + 1) % bgmNotes.length;
      }, 500);
    }

    function stopBGM() {
      if (bgmIntervalRef) clearInterval(bgmIntervalRef);
    }

    // --- STREAMING_CHUNK:Game State & Controllers ---
    const questionBank = {
      fractions: {
        title: "Mode 1: Fraction Mix Operations",
        icon: '<i class="fa-solid fa-divide fa-2x"></i>',
        color: "from-blue-400 to-cyan-500",
        generate: generateFractionSet
      },
      decimals: {
        title: "Mode 2: Decimal Mix Operations",
        icon: '<i class="fa-solid fa-calculator fa-2x"></i>',
        color: "from-amber-400 to-orange-500",
        generate: generateDecimalSet
      }
    };

    let currentMode = null;
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let streak = 0;
    let maxStreak = 0;
    const TIME_LIMIT = 90; // Extended to 90 seconds for multi-step logic
    let timeLeft = TIME_LIMIT;
    let isAnswered = false;
    let selectedOptionIndex = null;
    let timerInterval = null;
    let stats = { correct: 0, timeBonus: 0, streakBonus: 0, baseScore: 0 };

    function animateNumber(elementId, endValue, duration = 1000) {
      const el = document.getElementById(elementId);
      const startValue = parseInt(el.innerText) || 0;
      if (startValue === endValue) {
        el.innerText = endValue;
        return;
      }
      const startTime = performance.now();
      
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
        const currentVal = Math.floor(startValue + (endValue - startValue) * easeProgress);
        el.innerText = currentVal;
        
        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          el.innerText = endValue;
        }
      }
      requestAnimationFrame(update);
    }

    function showScreen(screenId) {
      document.getElementById('home-screen').classList.replace('flex', 'hidden');
      document.getElementById('playing-screen').classList.replace('flex', 'hidden');
      document.getElementById('result-screen').classList.replace('flex', 'hidden');
      
      document.getElementById(screenId).classList.replace('hidden', 'flex');
      
      if (screenId !== 'playing-screen') {
        stopBGM();
      }
    }

    function initHome() {
      const container = document.getElementById('mode-buttons-container');
      container.innerHTML = '';
      
      Object.entries(questionBank).forEach(([key, data]) => {
        const btn = document.createElement('button');
        btn.className = `group relative overflow-hidden rounded-3xl p-8 text-white shadow-xl transform transition-all duration-300 hover:scale-105 hover:-translate-y-2 bg-gradient-to-br ${data.color} w-full md:w-1/2 btn-bounce`;
        btn.onclick = () => startGame(key);
        btn.innerHTML = `
          <div class="absolute top-0 right-0 p-4 opacity-20 transform translate-x-4 -translate-y-4 group-hover:scale-150 transition-transform duration-500">
            ${data.icon}
          </div>
          <div class="flex flex-col items-center text-center gap-4 relative z-10">
            <div class="bg-white/30 p-4 rounded-full backdrop-blur-sm text-white">
              ${data.icon}
            </div>
            <h2 class="text-2xl font-bold tracking-wide">${data.title}</h2>
            <div class="mt-4 bg-white/20 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2">
              <i class="fa-solid fa-play"></i> Start Challenge (20 Qs)
            </div>
          </div>
        `;
        container.appendChild(btn);
      });
    }

    // --- STREAMING_CHUNK:Game Loop Execution ---
    function startGame(mode) {
      initAudio();
      playSFX('click');
      currentMode = mode;
      
      // Dynamically Generate Questions!
      questions = questionBank[mode].generate(20);

      // Reset State
      currentIndex = 0;
      score = 0;
      streak = 0;
      maxStreak = 0;
      stats = { correct: 0, timeBonus: 0, streakBonus: 0, baseScore: 0 };
      document.getElementById('hud-score').innerText = '0';
      
      showScreen('playing-screen');
      document.getElementById('hud-title').innerText = questionBank[mode].title;
      
      startBGM();
      loadQuestion();
    }

    function loadQuestion() {
      isAnswered = false;
      selectedOptionIndex = null;
      timeLeft = TIME_LIMIT;
      
      const currentQ = questions[currentIndex];
      
      // Update HUD
      document.getElementById('hud-progress').innerText = `Question ${currentIndex + 1}/${questions.length}`;
      document.getElementById('progress-bar').style.width = `${(currentIndex / questions.length) * 100}%`;
      
      const streakEl = document.getElementById('hud-streak');
      if (streak >= 3) {
        streakEl.classList.remove('hidden');
        document.getElementById('streak-count').innerText = streak;
      } else {
        streakEl.classList.add('hidden');
      }

      document.getElementById('timeout-msg').classList.add('hidden');
      
      // Render Question using KaTeX
      const qTextElement = document.getElementById('question-text');
      qTextElement.innerHTML = ''; 
      katex.render(currentQ.q + ' = ?', qTextElement, { throwOnError: false, displayMode: true });
      
      // Render Options using KaTeX
      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = '';
      
      currentQ.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.id = `option-btn-${idx}`;
        btn.className = "option-btn-katex relative w-full text-center p-6 sm:p-8 rounded-2xl border-b-[6px] font-black text-2xl sm:text-3xl transition-all duration-200 flex items-center justify-center overflow-hidden bg-white border-indigo-200 text-indigo-700 hover:bg-indigo-50 hover:border-indigo-400 hover:-translate-y-1 hover:shadow-md cursor-pointer active:border-b-0 active:translate-y-2";
        btn.onclick = () => handleAnswer(idx);
        
        btn.innerHTML = `
          <span class="relative z-10" id="opt-txt-${idx}"></span>
          <span id="option-icon-${idx}" class="absolute right-6 z-10 hidden"></span>
        `;
        optionsContainer.appendChild(btn);

        // Render math in the option span
        katex.render(opt, document.getElementById(`opt-txt-${idx}`), { throwOnError: false, displayMode: false });
      });

      startTimer();
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      updateTimerUI();
      
      timerInterval = setInterval(() => {
        if (!isAnswered && timeLeft > 0) {
          timeLeft--;
          updateTimerUI();
        }
        
        if (timeLeft === 0 && !isAnswered) {
          document.getElementById('timeout-msg').classList.remove('hidden');
        }
      }, 1000);
    }

    function updateTimerUI() {
      const bar = document.getElementById('timer-bar');
      const text = document.getElementById('timer-text');
      bar.style.width = `${(timeLeft / TIME_LIMIT) * 100}%`;
      text.innerText = `${timeLeft}s`;
      
      if (timeLeft > 10) {
        bar.classList.replace('bg-red-500', 'bg-green-400') || bar.classList.add('bg-green-400');
      } else {
        bar.classList.replace('bg-green-400', 'bg-red-500') || bar.classList.add('bg-red-500');
      }
    }

    function handleAnswer(index) {
      if (isAnswered) return;
      isAnswered = true;
      selectedOptionIndex = index;
      
      const currentQ = questions[currentIndex];
      const isCorrect = index === currentQ.correct;

      currentQ.options.forEach((_, idx) => {
        const btn = document.getElementById(`option-btn-${idx}`);
        const iconContainer = document.getElementById(`option-icon-${idx}`);
        btn.disabled = true;
        btn.className = "option-btn-katex relative w-full text-center p-6 sm:p-8 rounded-2xl border-b-[6px] font-black text-2xl sm:text-3xl transition-all duration-200 flex items-center justify-center overflow-hidden ";
        
        if (idx === currentQ.correct) {
          btn.className += "bg-green-100 border-green-500 text-green-800 scale-[1.02] shadow-lg z-10";
          iconContainer.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 text-3xl animate-bounce"></i>';
          iconContainer.classList.remove('hidden');
        } else if (idx === selectedOptionIndex) {
          btn.className += "bg-red-100 border-red-500 text-red-800 opacity-90";
          iconContainer.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 text-3xl"></i>';
          iconContainer.classList.remove('hidden');
        } else {
          btn.className += "bg-slate-50 border-slate-200 text-slate-400 opacity-50 scale-95";
        }
      });

      if (isCorrect) {
        playSFX('correct');
        const basePoints = 100;
        let timeBonusPoints = 0;
        
        // Adjusted bonus tiers for 90-second limit
        if (timeLeft >= 60) timeBonusPoints = timeLeft * 30;
        else if (timeLeft >= 30) timeBonusPoints = timeLeft * 20;
        else timeBonusPoints = timeLeft * 10;

        const newStreak = streak + 1;
        const streakBonusPoints = newStreak >= 3 ? newStreak * 20 : 0;
        
        const totalPoints = basePoints + timeBonusPoints + streakBonusPoints;
        
        score += totalPoints;
        streak = newStreak;
        maxStreak = Math.max(maxStreak, newStreak);
        
        stats.correct += 1;
        stats.baseScore += basePoints;
        stats.timeBonus += timeBonusPoints;
        stats.streakBonus += streakBonusPoints;
        
        animateNumber('hud-score', score, 500);
      } else {
        playSFX('wrong');
        streak = 0;
      }

      if (streak >= 3) {
        document.getElementById('hud-streak').classList.remove('hidden');
        document.getElementById('streak-count').innerText = streak;
      } else {
        document.getElementById('hud-streak').classList.add('hidden');
      }

      setTimeout(nextQuestion, 2500);
    }

    function nextQuestion() {
      if (currentIndex < questions.length - 1) {
        playSFX('click');
        currentIndex++;
        loadQuestion();
      } else {
        playSFX('result');
        showResult();
      }
    }

    function showResult() {
      stopBGM();
      showScreen('result-screen');
      
      const accuracy = Math.round((stats.correct / questions.length) * 100);
      let message = "";
      let stars = 0;
      
      if (accuracy >= 90) { message = "Math Genius! 🏆"; stars = 3; }
      else if (accuracy >= 70) { message = "Great Job! 🌟"; stars = 2; }
      else { message = "Keep Trying! 💪"; stars = 1; }

      document.getElementById('result-message').innerText = message;
      document.getElementById('result-subtitle').innerText = `Completed ${questionBank[currentMode].title}`;
      
      const starsContainer = document.getElementById('result-stars');
      starsContainer.innerHTML = '';
      for (let i = 1; i <= 3; i++) {
        const delay = i * 0.1;
        const colorClass = i <= stars ? 'text-yellow-400 animate-bounce' : 'text-gray-200';
        starsContainer.innerHTML += `<i class="fa-solid fa-star text-5xl ${colorClass}" style="animation-delay: ${delay}s"></i>`;
      }

      document.getElementById('stat-correct').innerText = `${stats.correct} / ${questions.length}`;
      document.getElementById('stat-streak').innerText = `${maxStreak} in a row`;
      document.getElementById('stat-timebonus').innerText = `+${stats.timeBonus}`;
      document.getElementById('stat-streakbonus').innerText = `+${stats.streakBonus}`;
      
      document.getElementById('final-score').innerText = '0';
      animateNumber('final-score', score, 1500);
    }

    // Bootstrap
    window.onload = () => {
      initHome();
      showScreen('home-screen');
    };

  </script>
</body>
</html>
