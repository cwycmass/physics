<!DOCTYPE html>
<html lang="zh-HK">
<head>

  <title>科學超級大挑戰 - 小一科學</title>

  <!-- FontAwesome Icons -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
    
    body {
      font-family: 'Nunito', 'Microsoft JhengHei', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .linear-transition {
      transition: width 1s linear, background-color 0.3s;
    }

    .btn-bounce:active {
      transform: translateY(4px);
    }

    /* 隱藏滾動條 */
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-2 sm:p-4 text-slate-800">

        科學超級大挑戰

    </div>

    </div>

          </span>
          <span id="hud-streak" class="hidden bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-black flex items-center gap-1 animate-pulse">
            <i class="fa-solid fa-fire"></i> <span id="streak-count"></span> 連擊!
          </span>
        </div>
      </div>
      <div class="text-right">
        <div class="text-slate-400 font-bold text-sm mb-1">分數 SCORE</div>
        <div id="hud-score" class="text-3xl sm:text-4xl font-black text-indigo-600 transition-all duration-300">0</div>
      </div>
    </div>

        <div id="timer-text" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-[10px] font-black text-white drop-shadow-md">

      <div class="p-6 sm:p-10 flex flex-col flex-1 min-h-[500px]">

    </div>

    // --- 音效引擎 (Web Audio API) ---
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    let soundEnabled = true;
    let bgmIntervalRef = null;
    let noteIdx = 0;
    const bgmNotes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63];

    function initAudio() {
      if (!actx) actx = new AudioCtx();
      if (actx.state === 'suspended') actx.resume();
    }

    function playTone(freq, type, duration, vol) {
      if (!actx || !soundEnabled) return;
      try {
        if (actx.state === 'suspended') actx.resume();
        const osc = actx.createOscillator();
        const gain = actx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, actx.currentTime);
        gain.gain.setValueAtTime(vol, actx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
        osc.connect(gain);
        gain.connect(actx.destination);
        osc.start();
        osc.stop(actx.currentTime + duration);
      } catch (e) {}
    }

    function playSFX(type) {
      if (!soundEnabled) return;
      initAudio();
      if (type === 'click') playTone(600, 'sine', 0.05, 0.05);
      if (type === 'correct') {
        playTone(523.25, 'sine', 0.1, 0.1);
        setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100);
        setTimeout(() => playTone(783.99, 'sine', 0.3, 0.1), 200);
      }
      if (type === 'wrong') {
        playTone(250, 'sawtooth', 0.3, 0.1);
        setTimeout(() => playTone(200, 'sawtooth', 0.4, 0.1), 200);
      }
      if (type === 'result') {
        [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => 
          setTimeout(() => playTone(f, 'square', 0.2, 0.1), i * 150)
        );
      }
    }

      soundEnabled = !soundEnabled;
      const icon = document.getElementById('audio-icon');
      if (soundEnabled) {
        icon.className = "fa-solid fa-volume-high text-xl";
        if (currentMode && document.getElementById('playing-screen').classList.contains('flex')) {
          startBGM();
        }
      } else {
        icon.className = "fa-solid fa-volume-xmark text-xl";
        stopBGM();
      }
    }

    function startBGM() {
      stopBGM();
      if (!soundEnabled) return;
      initAudio();
      bgmIntervalRef = setInterval(() => {
        playTone(bgmNotes[noteIdx], 'triangle', 0.4, 0.02);
        noteIdx = (noteIdx + 1) % bgmNotes.length;
      }, 500);
    }

    function stopBGM() {
      if (bgmIntervalRef) clearInterval(bgmIntervalRef);
    }

    // --- 遊戲狀態 ---
    let currentMode = null;
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let streak = 0;
    let maxStreak = 0;
    let timeLeft = 15;
    let isAnswered = false;
    let selectedOptionIndex = null;
    let timerInterval = null;
    let stats = { correct: 0, timeBonus: 0, streakBonus: 0, baseScore: 0 };

    // --- 工具函數 ---
    function shuffleArray(array) {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    }

    function animateNumber(elementId, endValue, duration = 1000) {
      const el = document.getElementById(elementId);
      const startValue = parseInt(el.innerText) || 0;
      if (startValue === endValue) {
        el.innerText = endValue;
        return;
      }
      const startTime = performance.now();
      
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
        const currentVal = Math.floor(startValue + (endValue - startValue) * easeProgress);
        el.innerText = currentVal;
        
        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          el.innerText = endValue;
        }
      }
      requestAnimationFrame(update);
    }

    // --- 畫面控制 ---
    function showScreen(screenId) {
      document.getElementById('home-screen').classList.replace('flex', 'hidden');
      document.getElementById('playing-screen').classList.replace('flex', 'hidden');
      document.getElementById('result-screen').classList.replace('flex', 'hidden');
      
      document.getElementById(screenId).classList.replace('hidden', 'flex');
      
      if (screenId !== 'playing-screen') {
        stopBGM();
      }
    }

    // --- 初始化首頁 ---
    function initHome() {
      const container = document.getElementById('mode-buttons-container');
      container.innerHTML = '';
      
      Object.entries(questionBank).forEach(([key, data]) => {
        const btn = document.createElement('button');
        btn.className = `group relative overflow-hidden rounded-3xl p-8 text-white shadow-xl transform transition-all duration-300 hover:scale-105 hover:-translate-y-2 bg-gradient-to-br ${data.color} btn-bounce`;
        btn.onclick = () => startGame(key);
        btn.innerHTML = `
          <div class="absolute top-0 right-0 p-4 opacity-20 transform translate-x-4 -translate-y-4 group-hover:scale-150 transition-transform duration-500">
            ${data.icon}
          </div>
          <div class="flex flex-col items-center text-center gap-4 relative z-10">
            <div class="bg-white/30 p-4 rounded-full backdrop-blur-sm text-white">
              ${data.icon}
            </div>
            <h2 class="text-2xl font-bold tracking-wide">${data.title}</h2>
            <div class="mt-4 bg-white/20 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2">
              <i class="fa-solid fa-play"></i> 開始挑戰
            </div>
          </div>
        `;
        container.appendChild(btn);
      });
    }

    // --- 遊戲邏輯 ---
    function startGame(mode) {
      initAudio();
      playSFX('click');
      currentMode = mode;
      
      // 洗牌
      const rawQuestions = questionBank[mode].questions;
      questions = shuffleArray(rawQuestions).map(q => {
        const correctText = q.options[q.correct];
        const shuffledOptions = shuffleArray([...q.options]);
        const newCorrectIndex = shuffledOptions.indexOf(correctText);
        return { ...q, options: shuffledOptions, correct: newCorrectIndex };
      });

      // 重置狀態
      currentIndex = 0;
      score = 0;
      streak = 0;
      maxStreak = 0;
      stats = { correct: 0, timeBonus: 0, streakBonus: 0, baseScore: 0 };
      document.getElementById('hud-score').innerText = '0';
      
      showScreen('playing-screen');
      document.getElementById('hud-title').innerText = questionBank[mode].title;
      
      startBGM();
      loadQuestion();
    }

    function loadQuestion() {
      isAnswered = false;
      selectedOptionIndex = null;
      timeLeft = 15;
      
      const currentQ = questions[currentIndex];
      
      // 更新 HUD
      document.getElementById('hud-progress').innerText = `第 ${currentIndex + 1}/${questions.length} 題`;
      document.getElementById('progress-bar').style.width = `${(currentIndex / questions.length) * 100}%`;
      
      const streakEl = document.getElementById('hud-streak');
      if (streak >= 3) {
        streakEl.classList.remove('hidden');
        document.getElementById('streak-count').innerText = streak;
      } else {
        streakEl.classList.add('hidden');
      }

      document.getElementById('timeout-msg').classList.add('hidden');
      document.getElementById('question-text').innerText = currentQ.q;
      
      // 繪製選項
      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = '';
      
      currentQ.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.id = `option-btn-${idx}`;
        btn.className = "relative w-full text-left p-6 sm:p-8 rounded-2xl border-b-[6px] font-bold text-xl sm:text-2xl transition-all duration-200 flex items-center justify-between overflow-hidden bg-white border-indigo-200 text-slate-700 hover:bg-indigo-50 hover:border-indigo-400 hover:-translate-y-1 hover:shadow-md cursor-pointer active:border-b-0 active:translate-y-2";
        btn.onclick = () => handleAnswer(idx);
        
        btn.innerHTML = `
          <span class="relative z-10">${opt}</span>
          <span id="option-icon-${idx}" class="relative z-10 hidden"></span>
        `;
        optionsContainer.appendChild(btn);
      });

      startTimer();
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      updateTimerUI();
      
      timerInterval = setInterval(() => {
        if (!isAnswered && timeLeft > 0) {
          timeLeft--;
          updateTimerUI();
        }
        
        if (timeLeft === 0 && !isAnswered) {
          document.getElementById('timeout-msg').classList.remove('hidden');
        }
      }, 1000);
    }

    function updateTimerUI() {
      const bar = document.getElementById('timer-bar');
      const text = document.getElementById('timer-text');
      bar.style.width = `${(timeLeft / 15) * 100}%`;
      text.innerText = `${timeLeft}s`;
      
      if (timeLeft > 5) {
        bar.classList.replace('bg-red-500', 'bg-green-400') || bar.classList.add('bg-green-400');
      } else {
        bar.classList.replace('bg-green-400', 'bg-red-500') || bar.classList.add('bg-red-500');
      }
    }

    function handleAnswer(index) {
      if (isAnswered) return;
      isAnswered = true;
      selectedOptionIndex = index;
      
      const currentQ = questions[currentIndex];
      const isCorrect = index === currentQ.correct;

      // 禁用所有按鈕並更新樣式
      currentQ.options.forEach((_, idx) => {
        const btn = document.getElementById(`option-btn-${idx}`);
        const iconContainer = document.getElementById(`option-icon-${idx}`);
        btn.disabled = true;
        btn.className = "relative w-full text-left p-6 sm:p-8 rounded-2xl border-b-[6px] font-bold text-xl sm:text-2xl transition-all duration-200 flex items-center justify-between overflow-hidden ";
        
        if (idx === currentQ.correct) {
          btn.className += "bg-green-100 border-green-500 text-green-800 scale-[1.02] shadow-lg z-10";
          iconContainer.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 text-3xl animate-bounce"></i>';
          iconContainer.classList.remove('hidden');
        } else if (idx === selectedOptionIndex) {
          btn.className += "bg-red-100 border-red-500 text-red-800 opacity-90";
          iconContainer.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 text-3xl"></i>';
          iconContainer.classList.remove('hidden');
        } else {
          btn.className += "bg-slate-50 border-slate-200 text-slate-400 opacity-50 scale-95";
        }
      });

      if (isCorrect) {
        playSFX('correct');
        const basePoints = 100;
        let timeBonusPoints = 0;
        
        if (timeLeft >= 12) timeBonusPoints = timeLeft * 30;
        else if (timeLeft >= 7) timeBonusPoints = timeLeft * 20;
        else timeBonusPoints = timeLeft * 10;

        const newStreak = streak + 1;
        const streakBonusPoints = newStreak >= 3 ? newStreak * 20 : 0;
        
        const totalPoints = basePoints + timeBonusPoints + streakBonusPoints;
        
        score += totalPoints;
        streak = newStreak;
        maxStreak = Math.max(maxStreak, newStreak);
        
        stats.correct += 1;
        stats.baseScore += basePoints;
        stats.timeBonus += timeBonusPoints;
        stats.streakBonus += streakBonusPoints;
        
        animateNumber('hud-score', score, 500);
      } else {
        playSFX('wrong');
        streak = 0;
      }

      // 更新HUD（若剛好達成連擊）
      if (streak >= 3) {
        document.getElementById('hud-streak').classList.remove('hidden');
        document.getElementById('streak-count').innerText = streak;
      } else {
        document.getElementById('hud-streak').classList.add('hidden');
      }

      setTimeout(nextQuestion, 2000);
    }

    function nextQuestion() {
      if (currentIndex < questions.length - 1) {
        playSFX('click');
        currentIndex++;
        loadQuestion();
      } else {
        playSFX('result');
        showResult();
      }
    }

    function showResult() {
      stopBGM();
      showScreen('result-screen');
      
      const accuracy = Math.round((stats.correct / questions.length) * 100);
      let message = "";
      let stars = 0;
      
      if (accuracy >= 90) { message = "太神啦！科學小天才！🏆"; stars = 3; }
      else if (accuracy >= 70) { message = "表現很棒！繼續保持！🌟"; stars = 2; }
      else { message = "再接再厲！你可以的！💪"; stars = 1; }

      document.getElementById('result-message').innerText = message;
      document.getElementById('result-subtitle').innerText = `完成了 ${questionBank[currentMode].title}`;
      
      // 生成星星
      const starsContainer = document.getElementById('result-stars');
      starsContainer.innerHTML = '';
      for (let i = 1; i <= 3; i++) {
        const delay = i * 0.1;
        const colorClass = i <= stars ? 'text-yellow-400 animate-bounce' : 'text-gray-200';
        starsContainer.innerHTML += `<i class="fa-solid fa-star text-5xl ${colorClass}" style="animation-delay: ${delay}s"></i>`;
      }

      // 填入統計數據
      document.getElementById('stat-correct').innerText = `${stats.correct} / ${questions.length}`;
      document.getElementById('stat-streak').innerText = `${maxStreak} 連對`;
      document.getElementById('stat-timebonus').innerText = `+${stats.timeBonus}`;
      document.getElementById('stat-streakbonus').innerText = `+${stats.streakBonus}`;
      
      // 數字動畫
      document.getElementById('final-score').innerText = '0';
      animateNumber('final-score', score, 1500);
    }

    // 啟動首頁
    window.onload = () => {
      initHome();
      showScreen('home-screen');
    };

  </script>
</body>
</html>
