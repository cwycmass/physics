<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>側向位移模擬器 | Lateral Displacement Simulator</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- MathJax 3 for Physics Formulas -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            startup: { typeset: false } // We will trigger it manually
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <!-- Custom Configuration and Styling -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cma: {
                            blue: '#1e3c72',
                            light: '#2a5298',
                            dark: '#112240',
                        },
                        vector: {
                            blue: '#3b82f6',
                            emerald: '#10b981',
                            amber: '#f59e0b',
                            purple: '#8b5cf6',
                            teal: '#14b8a6',
                            red: '#DC2626',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        };
    </script>

    <style>
        /* --- CSS Custom Variables & Utilities --- */
        :root {
            --grid-size: 50px;
            --grid-x: 0px;
            --grid-y: 0px;
        }

        /* Responsive Grid Background tied to mathematical origin */
        .bg-grid {
            background-color: #f8fafc;
            background-image:
                linear-gradient(to right, rgba(148, 163, 184, 0.25) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(148, 163, 184, 0.25) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            background-position: var(--grid-x) var(--grid-y);
        }

        /* Custom Scrollbar for Sidebar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Slider Styling */
        input[type=range] {
            accent-color: #1e3c72;
        }
    </style>
</head>

<!-- Body set to fixed inset-0 to prevent 100vh iOS Safari layout bugs -->
<body class="bg-slate-50 font-sans text-slate-800 antialiased fixed inset-0 overflow-hidden">
    
    <!-- Main App Container -->
    <div id="app" class="absolute inset-0 flex flex-col overflow-hidden">
        
        <!-- Header: Now visible on both desktop and mobile -->
        <header class="flex shrink-0 h-16 bg-cma-blue text-white items-center justify-between px-4 md:px-6 shadow-md z-20">

                <button id="mobile-menu-btn" class="md:hidden p-2 text-white hover:bg-white/10 rounded-lg transition-colors active:scale-95">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>

                    <polygon points="12,3 2,21 22,21" stroke-linejoin="round" class="text-white"></polygon>
                    <line x1="1" y1="14" x2="8.5" y2="12.5" stroke="#f59e0b" stroke-width="2.5"></line>
                    <line x1="8.5" y1="12.5" x2="14.5" y2="15.5" stroke="#10b981" stroke-width="2.5"></line>
                    <line x1="14.5" y1="15.5" x2="23" y2="13.5" stroke="#f59e0b" stroke-width="2.5"></line>
                </svg>
                <h1 class="text-sm sm:text-lg md:text-xl font-bold tracking-wide select-none" data-i18n="title">側向位移模擬器</h1>
            </div>
            
            <div class="flex items-center gap-2 md:gap-4">
                <!-- Help & Language Buttons: Fully integrated and responsive -->
                <button class="btn-help px-2.5 sm:px-3 py-1 sm:py-1.5 bg-vector-amber hover:bg-yellow-500 text-white rounded-lg transition-colors text-xs sm:text-sm font-medium shadow-sm flex items-center gap-1.5 active:scale-95">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

                        <h2 class="font-bold text-cma-blue mb-2 flex items-center gap-2">

                            </div>

                                <span id="val-t" class="text-cma-blue font-bold"><i>t</i> = 5.0 cm</span>
                            </div>
                            <input type="range" id="slider-t" min="1" max="10" step="0.1" value="5.0" class="w-full">

                    </div>

                </div>

                <!-- Math Output Area (1:1 Ratio with independent scrolling) -->
                <div class="flex-1 min-h-0 p-5 bg-blue-50/50 border-t border-blue-100 overflow-y-auto custom-scrollbar flex flex-col">
                    <h3 class="text-sm font-bold text-cma-blue mb-2" data-i18n="calc_result">數學推導與結果</h3>
                    <div id="math-output" class="text-sm text-slate-700 overflow-x-auto custom-scrollbar flex-1">
                        <!-- LaTeX will be injected here -->
                    </div>

            </aside>

            <!-- Canvas Area (Fully expands to take the remaining area) -->
            <main id="canvas-container" class="flex-1 relative bg-grid overflow-hidden min-h-0">
                <canvas id="sim-canvas" class="absolute inset-0 w-full h-full cursor-crosshair"></canvas>
                
                <!-- Floating Action Buttons on Canvas -->
                <button id="btn-replay" class="absolute bottom-6 right-6 px-4 py-2 bg-white/95 backdrop-blur-md rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.1)] text-cma-blue font-semibold hover:bg-slate-50 transition-all flex items-center gap-2 border border-slate-200/50 z-10 active:scale-95 select-none">
                    <svg class="w-5 h-5 animate-spin-slow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    <span data-i18n="replay">重新播放</span>
                </button>
            </main>
        </div>

        <!-- Desktop Footer -->
        <footer class="hidden md:flex shrink-0 h-10 bg-slate-200 items-center justify-center text-sm font-medium text-slate-600 z-20">
            <span data-i18n="footer">廠商會中學．物理科</span>
        </footer>
    </div>

    <!-- Off-Canvas Mobile Sidebar (Occupies 80% screen width) -->
    <div id="mobile-sidebar" class="fixed inset-0 z-[100] hidden">
        <!-- Semi-transparent Overlay Background -->
        <div id="mobile-overlay" class="absolute inset-0 bg-black/50 transition-opacity opacity-0"></div>
        
        <!-- Drawer Container: Changed width dynamically to 80% of screen -->
        <div id="mobile-sidebar-content" class="absolute top-0 left-0 bottom-0 w-[80%] bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col">
            <!-- Sidebar Header -->
            <div class="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                <h2 class="text-md font-bold text-cma-blue flex items-center gap-2 select-none">
                    <svg class="w-5 h-5 text-vector-amber" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12,3 2,21 22,21" class="text-cma-blue"></polygon>
                    </svg>
                    <span data-i18n="controls">控制面板</span>
                </h2>
                <button id="close-sidebar-btn" class="p-1.5 text-slate-400 hover:text-slate-600 bg-white rounded-full shadow-sm border border-slate-100 active:scale-95 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- Sidebar Scrollable Body -->
            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-5">
                
                <!-- Controls Group -->
                <div class="bg-slate-50 rounded-xl p-4 border border-slate-100 shadow-sm space-y-4">
                    <!-- Parameter: Incidence Angle -->
                    <div class="space-y-1">
                        <div class="flex justify-between text-xs font-medium text-slate-700">
                            <label for="slider-i-mob" data-i18n="param_i">入射角 (<i>i</i>)</label>
                            <span id="val-i-mob" class="text-cma-blue font-bold"><i>i</i> = 45°</span>
                        </div>
                        <input type="range" id="slider-i-mob" min="0" max="80" step="1" value="45" class="w-full">
                    </div>

                    <!-- Parameter: Refractive Index -->
                    <div class="space-y-1">
                        <div class="flex justify-between text-xs font-medium text-slate-700">
                            <label for="slider-n-mob" data-i18n="param_n">折射率 (<i>n</i>)</label>
                            <span id="val-n-mob" class="text-cma-blue font-bold"><i>n</i> = 1.50</span>
                        </div>
                        <input type="range" id="slider-n-mob" min="1.0" max="2.5" step="0.01" value="1.50" class="w-full">
                    </div>

                    <!-- Parameter: Thickness -->
                    <div class="space-y-1">
                        <div class="flex justify-between text-xs font-medium text-slate-700">
                            <label for="slider-t-mob" data-i18n="param_t">玻璃磚厚度 (<i>t</i>)</label>
                            <span id="val-t-mob" class="text-cma-blue font-bold"><i>t</i> = 5.0 cm</span>
                        </div>
                        <input type="range" id="slider-t-mob" min="1" max="10" step="0.1" value="5.0" class="w-full">
                    </div>
                </div>

                <!-- Calculations Group -->
                <div class="bg-blue-50/50 rounded-xl p-4 border border-blue-100 shadow-sm space-y-2">
                    <h3 class="text-xs font-bold text-cma-blue select-none" data-i18n="calc_result">數學推導與結果</h3>
                    <div id="math-output-mob" class="text-xs text-slate-700 overflow-x-auto custom-scrollbar">

                    </div>

            </div>

            <!-- Sidebar Footer -->
            <div class="p-4 border-t border-slate-100 bg-slate-50 text-center text-xs font-medium text-slate-500">

    <!-- Help / Instruction Modal -->
    <div id="help-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4">
        <div id="help-overlay" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden transform scale-95 opacity-0 transition-all duration-300" id="help-panel">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-xl font-bold text-cma-blue flex items-center gap-2 select-none">
                    <svg class="w-6 h-6 text-vector-amber" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    <span data-i18n="help_title">物理原理解析</span>
                </h2>
                <button id="close-help-btn" class="text-slate-400 hover:text-slate-600 bg-white p-1.5 rounded-full shadow-sm">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto custom-scrollbar text-slate-700 space-y-4 leading-relaxed text-sm md:text-base">
                <p data-i18n="help_p1">當光線斜射進入兩面平行的玻璃磚時，會發生兩次折射。由於兩次折射的介質邊界平行，出射光線與入射光線將保持平行，但會產生一段垂直距離的偏移，稱為<strong>側向位移 (<i>d</i>)</strong>。</p>
                <div id="derivation-block" data-i18n="help_derivation">
                    <!-- Derivation formulas populated dynamically based on language -->
                </div>
                <p data-i18n="help_p2">從公式中可以看出，側向位移 \( d \) 與玻璃磚厚度 \( t \)成正比；入射角 \( i \) 越大，或折射率 \( n \) 越大，位移也會隨之增加。</p>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        /* --- 1. Global State & i18n --- */
        const DICT = {
            zh: {
                title: '側向位移模擬器',
                controls: '控制面板',
                param_i: '入射角 (<i>i</i>)',
                param_n: '折射率 (<i>n</i>)',
                param_t: '玻璃磚厚度 (<i>t</i>)',
                calc_result: '數學推導與結果',
                replay: '重新播放',
                help_btn: '說明',
                footer: '廠商會中學．物理科',
                help_title: '物理原理解析',
                help_p1: '當光線斜射進入兩面平行的玻璃磚時，會發生兩次折射。由於兩次折射的介質邊界平行，出射光線與入射光線將保持平行，但會產生一段垂直距離的偏移，稱為<strong>側向位移 (<i>d</i>)</strong>。',
                help_derivation: `<div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <h3 class="font-bold text-cma-blue mb-2">數學推導：</h3>
                    <ul class="list-disc pl-5 space-y-2">
                        <li>根據斯涅爾定律 (Snell's Law)：\\( 1 \\cdot \\sin(i) = n \\cdot \\sin(r) \\)</li>
                        <li>在玻璃磚內部，光線走過的距離為 \\( AB = \\frac{t}{\\cos(r)} \\)</li>
                        <li>位移 \\( d \\) 是直角三角形中的對邊：\\( d = AB \\cdot \\sin(i - r) \\)</li>
                        <li>代入合併得到公式：\\( d = \\frac{t \\cdot \\sin(i - r)}{\\cos(r)} \\)</li>
                    </ul>
                </div>`,
                help_p2: '從公式中可以看出，側向位移 \\( d \\) 與玻璃磚厚度 \\( t \\) 成正比；入射角 \\( i \\) 越大，或折射率 \\( n \\) 越大，位移也會隨之增加。'
            },
            en: {
                title: 'Lateral Displacement Simulator',
                controls: 'Control Panel',
                param_i: 'Angle of Incidence (<i>i</i>)',
                param_n: 'Refractive Index (<i>n</i>)',
                param_t: 'Slab Thickness (<i>t</i>)',
                calc_result: 'Calculations & Results',
                replay: 'Replay Animation',
                help_btn: 'Help',
                footer: 'CMA Secondary School. Physics Department.',
                help_title: 'Physics Principles',
                help_p1: 'When light passes obliquely through a parallel-sided glass slab, it refracts twice. Because the boundaries are parallel, the emergent ray is parallel to the incident ray but shifted by a perpendicular distance known as <strong>Lateral Displacement (<i>d</i>)</strong>.',
                help_derivation: `<div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <h3 class="font-bold text-cma-blue mb-2">Mathematical Derivation:</h3>
                    <ul class="list-disc pl-5 space-y-2">
                        <li>From Snell's Law: \\( 1 \\cdot \\sin(i) = n \\cdot \\sin(r) \\)</li>
                        <li>Distance traveled inside the slab: \\( AB = \\frac{t}{\\cos(r)} \\)</li>
                        <li>Displacement \\( d \\) in the right triangle: \\( d = AB \\cdot \\sin(i - r) \\)</li>
                        <li>Substituting to get the formula: \\( d = \\frac{t \\cdot \\sin(i - r)}{\\cos(r)} \\)</li>
                    </ul>
                </div>`,
                help_p2: 'From the formula, lateral displacement \\( d \\) is directly proportional to thickness \\( t \\). It also increases as the angle of incidence \\( i \\) or refractive index \\( n \\) increases.'
            }
        };

        const state = {
            lang: 'zh',
            i: 45,       // degrees
            n: 1.5,      // dimensionless
            t: 5.0,      // cm
            
            // Viewport & Scale
            scale: 50,   // px per cm
            cx: 0,       // center x in canvas
            cy: 0,       // center y in canvas
            
            // Animation
            progress: 1.0, 
            animId: null,
            startTime: null,
            duration: 2500 // ms
        };

        // DOM Elements
        const els = {
            canvas: document.getElementById('sim-canvas'),
            ctx: document.getElementById('sim-canvas').getContext('2d'),
            container: document.getElementById('canvas-container'),
            mathOutput: document.getElementById('math-output'),
            mathOutputMob: document.getElementById('math-output-mob'),
            
            // Sliders & Values (Desktop)
            sliderI: document.getElementById('slider-i'),
            sliderN: document.getElementById('slider-n'),
            sliderT: document.getElementById('slider-t'),
            valI: document.getElementById('val-i'),
            valN: document.getElementById('val-n'),
            valT: document.getElementById('val-t'),

            // Sliders & Values (Mobile Drawer)
            sliderIMob: document.getElementById('slider-i-mob'),
            sliderNMob: document.getElementById('slider-n-mob'),
            sliderTMob: document.getElementById('slider-t-mob'),
            valIMob: document.getElementById('val-i-mob'),
            valNMob: document.getElementById('val-n-mob'),
            valTMob: document.getElementById('val-t-mob'),
            
            // Mobile Sidebar
            sidebar: document.getElementById('mobile-sidebar'),
            sidebarOverlay: document.getElementById('mobile-overlay'),
            sidebarContent: document.getElementById('mobile-sidebar-content'),
            btnMenuOpen: document.getElementById('mobile-menu-btn'),
            btnMenuClose: document.getElementById('close-sidebar-btn'),

            // Help Modal
            modalHelp: document.getElementById('help-modal'),
            helpOverlay: document.getElementById('help-overlay'),
            helpPanel: document.getElementById('help-panel'),
            btnHelpClose: document.getElementById('close-help-btn'),
            
            // Actions
            btnReplay: document.getElementById('btn-replay'),
            btnsLang: document.querySelectorAll('.btn-lang'),
            btnsHelp: document.querySelectorAll('.btn-help'),
        };

        let mathJaxTimeout = null;

        /* --- 2. Localization (i18n) --- */
        function toggleLanguage() {
            state.lang = state.lang === 'zh' ? 'en' : 'zh';
            applyLanguage();
            updateMathDisplay();
        }

        function applyLanguage() {
            const dict = DICT[state.lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.innerHTML = dict[key];
            });

            // Re-render LaTeX for static math
            if (window.MathJax) {
                MathJax.typesetClear();
                MathJax.typesetPromise().catch(err => console.error(err));
            }
        }

        /* --- 3. UI Interactions & Modals --- */
        function setMobileSidebar(open) {
            if (open) {
                els.sidebar.classList.remove('hidden');
                void els.sidebar.offsetWidth; 
                els.sidebarOverlay.classList.remove('opacity-0');
                els.sidebarContent.classList.remove('-translate-x-full');
            } else {
                els.sidebarOverlay.classList.add('opacity-0');
                els.sidebarContent.classList.add('-translate-x-full');
                setTimeout(() => els.sidebar.classList.add('hidden'), 300);
            }
        }

        function setHelpModal(open) {
            if (open) {
                els.modalHelp.classList.remove('hidden');
                void els.modalHelp.offsetWidth;
                els.helpPanel.classList.remove('scale-95', 'opacity-0');
            } else {
                els.helpPanel.classList.add('scale-95', 'opacity-0');
                setTimeout(() => els.modalHelp.classList.add('hidden'), 300);
            }
        }

        /* --- 4. Physics & Math Logic --- */
        function getPhysicsData() {
            const i_rad = state.i * Math.PI / 180;
            const r_rad = Math.asin(Math.sin(i_rad) / state.n);
            const r_deg = r_rad * 180 / Math.PI;
            
            let d = 0;
            if (state.i > 0) {
                d = state.t * Math.sin(i_rad - r_rad) / Math.cos(r_rad);
            }

            return { i_rad, r_rad, r_deg, d };
        }

        function updateMathDisplay() {
            clearTimeout(mathJaxTimeout);
            
            const { r_deg, d } = getPhysicsData();
            const label_r = state.lang === 'zh' ? '折射角' : 'Refraction Angle';
            const label_d = state.lang === 'zh' ? '側向位移' : 'Lateral Displacement';

            const latex = `
                \\begin{align*}
                &\\text{${label_r} } (r):\\\\[1ex]
                r &= \\sin^{-1}\\left(\\frac{\\sin(${state.i}^\\circ)}{${state.n.toFixed(2)}}\\right) = ${r_deg.toFixed(2)}^\\circ \\\\[2ex]
                &\\text{${label_d} } (d):\\\\[1ex]
                d &= \\frac{${state.t.toFixed(1)}\\text{ cm} \\cdot \\sin(${state.i}^\\circ - ${r_deg.toFixed(2)}^\\circ)}{\\cos(${r_deg.toFixed(2)}^\\circ)} = \\mathbf{${d.toFixed(2)}\\text{ cm}}
                \\end{align*}
            `;

            mathJaxTimeout = setTimeout(() => {
                if (els.mathOutput) els.mathOutput.innerHTML = `\\( ${latex} \\)`;
                if (els.mathOutputMob) els.mathOutputMob.innerHTML = `\\( ${latex} \\)`;
                
                if (window.MathJax) {
                    MathJax.typesetPromise([els.mathOutput, els.mathOutputMob].filter(Boolean)).catch(err => console.error(err));
                }
            }, 150);
        }

        function updateUIValues() {
            // Update Desktop Panel Labels
            if (els.valI) els.valI.innerHTML = `<i>i</i> = ${state.i}&deg;`;
            if (els.valN) els.valN.innerHTML = `<i>n</i> = ${state.n.toFixed(2)}`;
            if (els.valT) els.valT.innerHTML = `<i>t</i> = ${state.t.toFixed(1)} cm`;

            // Update Mobile Drawer Panel Labels
            if (els.valIMob) els.valIMob.innerHTML = `<i>i</i> = ${state.i}&deg;`;
            if (els.valNMob) els.valNMob.innerHTML = `<i>n</i> = ${state.n.toFixed(2)}`;
            if (els.valTMob) els.valTMob.innerHTML = `<i>t</i> = ${state.t.toFixed(1)} cm`;
        }

        /* --- 5. Viewport & Canvas Transforms --- */
        function resizeAndFitViewport() {
            const rect = els.container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            
            els.canvas.width = rect.width * dpr;
            els.canvas.height = rect.height * dpr;
            
            els.ctx.setTransform(1, 0, 0, 1, 0, 0);
            els.ctx.scale(dpr, dpr);

            const padding = 60; 
            const maxW_cm = 22; 
            const maxH_cm = 16; 
            
            const scaleX = (rect.width - padding * 2) / maxW_cm;
            const scaleY = (rect.height - padding * 2) / maxH_cm;
            
            state.scale = Math.min(scaleX, scaleY);
            
            state.cx = rect.width / 2;
            state.cy = rect.height * 0.35; 

            document.documentElement.style.setProperty('--grid-size', `${state.scale}px`);
            document.documentElement.style.setProperty('--grid-x', `${state.cx}px`);
            document.documentElement.style.setProperty('--grid-y', `${state.cy}px`);

            drawCanvas();
        }

        function toPx(x, y) {
            return {
                x: state.cx + x * state.scale,
                y: state.cy - y * state.scale 
            };
        }

        function drawPillbox(ctx, x, y, text, bgColor, borderColor, textColor) {
            ctx.font = 'italic bold 15px Inter, sans-serif';
            const textWidth = ctx.measureText(text).width;
            
            const padX = 12;
            const padY = 6;
            const h = 26;
            const w = textWidth + padX * 2;
            
            const rx = x - w / 2;
            const ry = y - h / 2;
            const r = h / 2;

            ctx.save();
            ctx.beginPath();
            ctx.moveTo(rx + r, ry);
            ctx.lineTo(rx + w - r, ry);
            ctx.quadraticCurveTo(rx + w, ry, rx + w, ry + r);
            ctx.quadraticCurveTo(rx + w, ry + h, rx + w - r, ry + h);
            ctx.lineTo(rx + r, ry + h);
            ctx.quadraticCurveTo(rx, ry + h, rx, ry + r);
            ctx.quadraticCurveTo(rx, ry, rx + r, ry);
            ctx.closePath();

            ctx.fillStyle = bgColor;
            ctx.fill();

            if (borderColor && borderColor !== 'transparent') {
                ctx.strokeStyle = borderColor;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            ctx.fillStyle = textColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        /* --- 6. Drawing & Animation System --- */
        function drawCanvas() {
            const ctx = els.ctx;
            const rect = els.container.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            const { i_rad, r_rad, d } = getPhysicsData();
            const p = state.progress;

            const O = { x: 0, y: 0 }; 
            const E = { x: state.t * Math.tan(r_rad), y: -state.t }; 
            
            const L_in = 8; 
            const L_out = 8;
            
            const In_Start = { x: -L_in * Math.sin(i_rad), y: L_in * Math.cos(i_rad) };
            const Ext_E = { x: state.t * Math.tan(i_rad), y: -state.t };
            const Ext_End = { x: Ext_E.x + L_out * Math.sin(i_rad), y: Ext_E.y - L_out * Math.cos(i_rad) };
            const Out_End = { x: E.x + L_out * Math.sin(i_rad), y: E.y - L_out * Math.cos(i_rad) };

            // Draw Slab
            ctx.fillStyle = 'rgba(30, 60, 114, 0.04)'; 
            ctx.strokeStyle = 'rgba(30, 60, 114, 0.3)';
            ctx.lineWidth = 2;
            
            const slabTopLeft = toPx(-15, 0);
            const slabSize = { w: 30 * state.scale, h: state.t * state.scale };
            
            ctx.fillRect(slabTopLeft.x, slabTopLeft.y, slabSize.w, slabSize.h);
            ctx.beginPath();
            ctx.moveTo(slabTopLeft.x, slabTopLeft.y);
            ctx.lineTo(slabTopLeft.x + slabSize.w, slabTopLeft.y);
            ctx.moveTo(slabTopLeft.x, slabTopLeft.y + slabSize.h);
            ctx.lineTo(slabTopLeft.x + slabSize.w, slabTopLeft.y + slabSize.h);
            ctx.stroke();

            // Display Refractive Index of Upper Air Side
            const upperAirLabelPx = toPx(-12, 1.5);
            ctx.save();
            ctx.fillStyle = 'rgba(71, 85, 105, 0.65)'; 
            ctx.font = 'italic 16px Inter, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText('n', upperAirLabelPx.x, upperAirLabelPx.y);
            ctx.font = '16px Inter, sans-serif';
            ctx.fillText(' = 1.00', upperAirLabelPx.x + 12, upperAirLabelPx.y);
            ctx.restore();

            // Display Refractive Index inside Glass Slab
            const slabLabelPx = toPx(-12, -state.t/2);
            ctx.save();
            ctx.fillStyle = 'rgba(30, 60, 114, 0.65)';
            ctx.font = 'italic 16px Inter, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText('n', slabLabelPx.x, slabLabelPx.y);
            ctx.font = '16px Inter, sans-serif';
            ctx.fillText(` = ${state.n.toFixed(2)}`, slabLabelPx.x + 12, slabLabelPx.y);
            ctx.restore();

            // Display Refractive Index of Lower Air Side
            const lowerAirLabelPx = toPx(-12, -state.t - 1.5);
            ctx.save();
            ctx.fillStyle = 'rgba(71, 85, 105, 0.65)'; 
            ctx.font = 'italic 16px Inter, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText('n', lowerAirLabelPx.x, lowerAirLabelPx.y);
            ctx.font = '16px Inter, sans-serif';
            ctx.fillText(' = 1.00', lowerAirLabelPx.x + 12, lowerAirLabelPx.y);
            ctx.restore();

            // Draw Normals
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#94a3b8'; 
            ctx.lineWidth = 1.5;
            
            const n1_top = toPx(0, 3);
            const n1_bot = toPx(0, -state.t - 1);
            ctx.beginPath(); ctx.moveTo(n1_top.x, n1_top.y); ctx.lineTo(n1_bot.x, n1_bot.y); ctx.stroke();

            const n2_top = toPx(E.x, 1);
            const n2_bot = toPx(E.x, -state.t - 3);
            ctx.beginPath(); ctx.moveTo(n2_top.x, n2_top.y); ctx.lineTo(n2_bot.x, n2_bot.y); ctx.stroke();
            ctx.setLineDash([]);

            // Draw Angles arcs
            if (p > 0) {
                ctx.beginPath();
                ctx.arc(state.cx, state.cy, 30, -Math.PI/2 - i_rad, -Math.PI/2);
                ctx.strokeStyle = '#1e3c72';
                ctx.stroke();
                const i_text = toPx(-1.5 * Math.sin(i_rad/2), 1.5 * Math.cos(i_rad/2));
                ctx.fillStyle = '#1e3c72';
                ctx.font = 'italic 14px Inter, sans-serif';
                ctx.fillText('i', i_text.x - 4, i_text.y);
            }

            if (p > 0.33) {
                const r_px = toPx(0,0);
                ctx.beginPath();
                ctx.arc(r_px.x, r_px.y, 35, Math.PI/2 - r_rad, Math.PI/2);
                ctx.strokeStyle = '#10b981';
                ctx.stroke();
                const r_text = toPx(1.8 * Math.sin(r_rad/2), -1.8 * Math.cos(r_rad/2));
                ctx.fillStyle = '#10b981';
                ctx.fillText('r', r_text.x, r_text.y + 4);
            }

            ctx.lineWidth = 3;
            ctx.lineCap = 'round';

            const p1 = Math.min(1, p / 0.33);                   
            const p2 = Math.max(0, Math.min(1, (p - 0.33) / 0.33)); 
            const p3 = Math.max(0, Math.min(1, (p - 0.66) / 0.34)); 

            const drawRay = (start, end, color, fraction) => {
                if (fraction <= 0) return;
                const currentEnd = {
                    x: start.x + (end.x - start.x) * fraction,
                    y: start.y + (end.y - start.y) * fraction
                };
                const pxStart = toPx(start.x, start.y);
                const pxEnd = toPx(currentEnd.x, currentEnd.y);
                
                ctx.beginPath();
                ctx.moveTo(pxStart.x, pxStart.y);
                ctx.lineTo(pxEnd.x, pxEnd.y);
                ctx.strokeStyle = color;
                ctx.stroke();

                if (fraction >= 0.50) {
                    const midX = start.x + (end.x - start.x) * 0.5;
                    const midY = start.y + (end.y - start.y) * 0.5;
                    const pxMid = toPx(midX, midY);

                    const angle = Math.atan2(pxEnd.y - pxStart.y, pxEnd.x - pxStart.x);
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(pxMid.x, pxMid.y);
                    ctx.lineTo(pxMid.x - 10 * Math.cos(angle - Math.PI/6), pxMid.y - 10 * Math.sin(angle - Math.PI/6));
                    ctx.lineTo(pxMid.x - 10 * Math.cos(angle + Math.PI/6), pxMid.y - 10 * Math.sin(angle + Math.PI/6));
                    ctx.fillStyle = color;
                    ctx.fill();
                    ctx.restore();
                }
            };

            // 1. Incident Ray (Amber)
            drawRay(In_Start, O, '#f59e0b', p1);

            // 2. Refracted Ray (Emerald)
            drawRay(O, E, '#10b981', p2);

            // 3. Emergent Ray (Amber)
            drawRay(E, Out_End, '#f59e0b', p3);

            // 4. Extended Original Ray & Displacement
            if (p > 0.95 && state.i > 0) {
                const pxO = toPx(O.x, O.y);
                const pxExt = toPx(Ext_End.x, Ext_End.y);
                ctx.beginPath();
                ctx.moveTo(pxO.x, pxO.y);
                ctx.lineTo(pxExt.x, pxExt.y);
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = 'rgba(245, 158, 11, 0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.setLineDash([]);

                const u = { x: Math.sin(i_rad), y: -Math.cos(i_rad) };
                const dot = E.x * u.x + E.y * u.y;
                const P = { x: dot * u.x, y: dot * u.y };

                const pxE = toPx(E.x, E.y);
                const pxP = toPx(P.x, P.y);

                ctx.beginPath();
                ctx.moveTo(pxE.x, pxE.y);
                ctx.lineTo(pxP.x, pxP.y);
                ctx.strokeStyle = '#DC2626'; 
                ctx.lineWidth = 2.5;
                ctx.stroke();

                const arrowLength = 8;
                const arrowAngle = Math.PI / 6;
                const angleD = Math.atan2(pxE.y - pxP.y, pxE.x - pxP.x); 

                ctx.save();
                ctx.fillStyle = '#DC2626';

                ctx.beginPath();
                ctx.moveTo(pxE.x, pxE.y);
                ctx.lineTo(pxE.x - arrowLength * Math.cos(angleD - arrowAngle), pxE.y - arrowLength * Math.sin(angleD - arrowAngle));
                ctx.lineTo(pxE.x - arrowLength * Math.cos(angleD + arrowAngle), pxE.y - arrowLength * Math.sin(angleD + arrowAngle));
                ctx.closePath();
                ctx.fill();

                const oppAngle = angleD + Math.PI;
                ctx.beginPath();
                ctx.moveTo(pxP.x, pxP.y);
                ctx.lineTo(pxP.x - arrowLength * Math.cos(oppAngle - arrowAngle), pxP.y - arrowLength * Math.sin(oppAngle - arrowAngle));
                ctx.lineTo(pxP.x - arrowLength * Math.cos(oppAngle + arrowAngle), pxP.y - arrowLength * Math.sin(oppAngle + arrowAngle));
                ctx.closePath();
                ctx.fill();

                ctx.restore();

                const size = 8; 
                const nE = { x: pxE.x - pxP.x, y: pxE.y - pxP.y };
                const len_nE = Math.hypot(nE.x, nE.y);
                if (len_nE > 0) {
                    nE.x /= len_nE; nE.y /= len_nE;
                    const dirU = { x: pxExt.x - pxO.x, y: pxExt.y - pxO.y };
                    const lenU = Math.hypot(dirU.x, dirU.y);
                    dirU.x /= lenU; dirU.y /= lenU;
                    
                    const r_p1 = { x: pxP.x - dirU.x * size, y: pxP.y - dirU.y * size };
                    const r_p2 = { x: r_p1.x + nE.x * size, y: r_p1.y + nE.y * size };
                    const r_p3 = { x: pxP.x + nE.x * size, y: pxP.y + nE.y * size };
                    
                    ctx.beginPath();
                    ctx.moveTo(r_p1.x, r_p1.y);
                    ctx.lineTo(r_p2.x, r_p2.y);
                    ctx.lineTo(r_p3.x, r_p3.y);
                    ctx.strokeStyle = '#DC2626';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                const d_mid = {
                    x: (pxE.x + pxP.x) / 2,
                    y: (pxE.y + pxP.y) / 2
                };
                
                const offsetDistance = 16;
                const offsetDir = { x: -nE.y, y: nE.x }; 
                const finalLabelPos = {
                    x: d_mid.x + offsetDir.x * offsetDistance,
                    y: d_mid.y + offsetDir.y * offsetDistance
                };

                drawPillbox(ctx, finalLabelPos.x, finalLabelPos.y, 'd', 'rgba(255, 255, 255, 0.7)', null, '#DC2626');
            }
        }

        function animate(time) {
            if (!state.startTime) state.startTime = time;
            const elapsed = time - state.startTime;
            
            state.progress = Math.min(1.0, elapsed / state.duration);
            drawCanvas();

            if (state.progress < 1.0) {
                state.animId = requestAnimationFrame(animate);
            }
        }

        function startAnimation() {
            if (state.animId) cancelAnimationFrame(state.animId);
            state.progress = 0;
            state.startTime = null;
            state.animId = requestAnimationFrame(animate);
        }

        function interruptAnimation() {
            if (state.animId) cancelAnimationFrame(state.animId);
            state.progress = 1.0;
            drawCanvas();
        }

        /* --- 7. Event Listeners & Initialization --- */
        
        window.addEventListener('resize', resizeAndFitViewport);

        // UI Language Actions
        els.btnsLang.forEach(btn => btn.addEventListener('click', toggleLanguage));
        
        // Modal & Drawer bindings
        els.btnsHelp.forEach(btn => btn.addEventListener('click', () => {
            setMobileSidebar(false); 
            setHelpModal(true);
        }));
        
        els.btnHelpClose.addEventListener('click', () => setHelpModal(false));
        els.helpOverlay.addEventListener('click', () => setHelpModal(false));

        els.btnMenuOpen.addEventListener('click', () => setMobileSidebar(true));
        els.btnMenuClose.addEventListener('click', () => setMobileSidebar(false));
        els.sidebarOverlay.addEventListener('click', () => setMobileSidebar(false));

        els.btnReplay.addEventListener('click', startAnimation);

        // Unified Sliders Sync Handler (supports both mobile and desktop controls)
        const handleSliderChange = (e) => {
            const key = e.target.id.split('-')[1]; // i, n, or t
            const val = parseFloat(e.target.value);
            state[key] = val;
            
            // Mirror setting to counterpart controls
            const desktopSlider = document.getElementById(`slider-${key}`);
            const mobileSlider = document.getElementById(`slider-${key}-mob`);
            if (desktopSlider) desktopSlider.value = val;
            if (mobileSlider) mobileSlider.value = val;

            updateUIValues();
            interruptAnimation(); 
            updateMathDisplay();
        };

        els.sliderI.addEventListener('input', handleSliderChange);
        els.sliderN.addEventListener('input', handleSliderChange);
        els.sliderT.addEventListener('input', handleSliderChange);

        if (els.sliderIMob) els.sliderIMob.addEventListener('input', handleSliderChange);
        if (els.sliderNMob) els.sliderNMob.addEventListener('input', handleSliderChange);
        if (els.sliderTMob) els.sliderTMob.addEventListener('input', handleSliderChange);

        function init() {
            if(!window.MathJax) {
                setTimeout(init, 100);
                return;
            }
            applyLanguage();
            updateUIValues();
            updateMathDisplay();
            resizeAndFitViewport();
            
            setTimeout(startAnimation, 300);
        }

        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
