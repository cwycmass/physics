<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>力學向量加法與分解 | Force Vector Operations</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        window.MathJax = {
            tex: { 
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                packages: {'[+]': ['textcomp']}
            },
            startup: { typeset: false } // 關閉自動渲染，由我們的 JS 手動觸發
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* 基礎設置，使用 dynamic vh 防止 iOS Safari 網址列遮擋 */
        body {
            height: 100dvh;
            overflow: hidden;
            font-family: "PingFang HK", "Microsoft JhengHei", sans-serif;
            -webkit-text-size-adjust: 100%;
        }

        /* 畫布的網格背景：密集 (25px) 幾何參考 */
        .canvas-bg {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(#e2e8f0 1px, transparent 1px),
                linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 25px 25px;
        }

        /* 自訂控制面板與列表的流暢滾動條，並支援 iOS 慣性滾動 */
        .custom-scrollbar {
            -webkit-overflow-scrolling: touch;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* 分頁按鈕的活躍與非活躍狀態樣式 */
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; }
        .tab-inactive { color: #64748b; border-bottom: 2px solid transparent; }
        .tab-inactive:hover { color: #3b82f6; }
        
        /* 確保 MathJax 容器不會破壞 flex 排版 */
        mjx-container { display: inline-block !important; }
    </style>
</head>
<body class="flex flex-col bg-slate-100 text-slate-800">

    <header class="bg-[#1e3c72] text-white p-3 flex justify-between items-center shadow-md flex-shrink-0 z-20">
        <h1 class="text-base sm:text-lg font-bold tracking-wide flex items-center gap-2">
            <svg class="w-5 h-5 sm:w-6 h-6 text-blue-300 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 20h16M4 20V4M4 20l13.5-13.5M17.5 6.5h-4m4 0v4" />
            </svg>
            <span id="titleText">力學向量加法與分解</span>
        </h1>
        <div class="flex gap-2">
            <button id="helpBtn" class="bg-blue-600 hover:bg-blue-500 px-2.5 py-1.5 sm:px-3 sm:py-2 rounded text-xs sm:text-sm transition-colors border border-blue-400 shadow active:scale-95">說明</button>
            <button id="langBtn" class="bg-blue-600 hover:bg-blue-500 px-2.5 py-1.5 sm:px-3 sm:py-2 rounded text-xs sm:text-sm transition-colors border border-blue-400 shadow active:scale-95">繁/Eng</button>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <aside class="w-full md:w-80 lg:w-[26rem] bg-white shadow-[0_4px_15px_rgba(0,0,0,0.08)] md:shadow-[2px_0_15px_rgba(0,0,0,0.08)] z-10 flex flex-col flex-shrink-0 transition-all duration-300 h-[40vh] md:h-full md:border-r md:border-slate-200">
            
            <div class="flex border-b border-slate-200 bg-slate-50 flex-shrink-0">
                <button id="tabAddition" class="flex-1 py-3 text-sm font-bold tab-active transition-colors active:bg-slate-100">加法</button>
                <button id="tabResolution" class="flex-1 py-3 text-sm font-bold tab-inactive transition-colors active:bg-slate-100">分解</button>
            </div>

            <div class="p-3 sm:p-4 flex flex-col gap-2.5 sm:gap-3 overflow-y-auto custom-scrollbar flex-1 relative bg-white">
                
                <div id="uiAddition" class="flex flex-col gap-2.5 sm:gap-3 h-full">
                    <div class="flex flex-col gap-1">
                        <label id="modeLabel" class="text-xs sm:text-sm font-bold text-slate-700">顯示方式:</label>
                        <div class="flex flex-row md:flex-col gap-2 mt-0.5 bg-slate-50 border border-slate-200 p-2 rounded-lg">
                            <label class="flex-1 flex items-center gap-2 cursor-pointer py-1">
                                <input type="radio" name="visMode" value="head-to-tail" class="w-4 h-4 text-blue-600 focus:ring-blue-500" checked>
                                <span id="optHeadToTail" class="text-xs sm:text-sm text-slate-700 font-medium">首尾相接法則</span>
                            </label>
                            <label class="flex-1 flex items-center gap-2 cursor-pointer py-1">
                                <input type="radio" name="visMode" value="parallelogram" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                                <span id="optParallelogram" class="text-xs sm:text-sm text-slate-700 font-medium">平行四邊形法則</span>
                            </label>
                        </div>
                    </div>

                    <hr class="border-slate-100">

                    <div class="flex gap-2">
                        <div class="flex-1 flex flex-col gap-1">
                            <label id="magLabel" class="text-xs sm:text-sm font-bold text-slate-700">大小 $F$ (N):</label>
                            <input type="number" id="magnitude" value="10" min="0.1" step="0.5" class="w-full border border-slate-300 rounded-lg p-2 text-xs sm:text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none bg-slate-50">
                        </div>
                        <div class="flex-1 flex flex-col gap-1">
                            <label id="angleLabel" class="text-xs sm:text-sm font-bold text-slate-700">角度 $\theta$ ($^\circ$):</label>
                            <input type="number" id="angle" value="45" min="0" max="360" step="1" class="w-full border border-slate-300 rounded-lg p-2 text-xs sm:text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none bg-slate-50">
                        </div>
                    </div>
                    
                    <div class="flex gap-2 mt-1">
                        <button id="addBtn" class="flex-1 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-bold py-2 px-1.5 sm:px-2 rounded-lg transition-colors text-xs sm:text-sm shadow-sm active:scale-95">加入</button>
                        <button id="clearBtn" class="flex-1 bg-slate-500 hover:bg-slate-600 active:bg-slate-700 text-white font-bold py-2 px-1.5 sm:px-2 rounded-lg transition-colors text-xs sm:text-sm shadow-sm active:scale-95">清除</button>
                    </div>

                    <div id="vectorList" class="flex-1 min-h-[80px] max-h-[140px] md:max-h-none border border-slate-200 rounded-lg bg-slate-50 p-2 overflow-y-auto custom-scrollbar flex flex-col gap-1">
                        </div>

                    <div class="mt-auto bg-red-50 p-2.5 sm:p-3 rounded-lg border-l-4 border-red-600 shadow-inner flex-shrink-0">
                        <strong id="resultTitle" class="text-xs sm:text-sm text-slate-800">合力:</strong>
                        <div id="resultOutput" class="mt-0.5 text-sm sm:text-[1.05rem] font-semibold text-red-700 leading-normal">
                            $R = 0.00 \text{ N}$<br>$\theta = 0.0^\circ$
                        </div>
                    </div>
                </div>

                <div id="uiResolution" class="hidden flex-col gap-2.5 sm:gap-3 h-full">
                    <div class="bg-indigo-50 p-2.5 sm:p-3 rounded-lg border border-indigo-100 flex flex-col gap-1.5">
                        <strong id="resVectorLabel" class="text-xs sm:text-sm text-indigo-900 block">待分解的力:</strong>
                        <div class="flex gap-2">
                            <div class="flex-1 flex flex-col gap-1">
                                <label id="resMagLabel" class="text-[0.7rem] sm:text-[0.8rem] font-bold text-slate-700">大小 $F$ (N):</label>
                                <input type="number" id="resMagnitude" value="20" min="0.1" step="0.5" class="w-full border border-slate-300 rounded-lg p-1.5 text-xs sm:text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none input-trigger">
                            </div>
                            <div class="flex-1 flex flex-col gap-1">
                                <label id="resAngleLabel" class="text-[0.7rem] sm:text-[0.8rem] font-bold text-slate-700">角度 $\theta$ ($^\circ$):</label>
                                <input type="number" id="resAngle" value="60" min="0" max="360" step="1" class="w-full border border-slate-300 rounded-lg p-1.5 text-xs sm:text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none input-trigger">
                            </div>
                        </div>
                    </div>

                    <hr class="border-slate-100">
                    
                    <strong id="resAxesLabel" class="text-xs sm:text-sm text-slate-800">分解方向:</strong>
                    <div class="flex gap-2">
                        <div class="flex-1 flex flex-col gap-1">
                            <label id="axis1Label" class="text-[0.7rem] sm:text-[0.8rem] font-bold text-blue-700">軸 1 傾角 $\alpha$ ($^\circ$):</label>
                            <input type="number" id="resAxis1" value="0" step="1" class="w-full border border-blue-200 bg-blue-50 rounded-lg p-1.5 text-xs sm:text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none input-trigger">
                        </div>
                        <div class="flex-1 flex flex-col gap-1">
                            <label id="axis2Label" class="text-[0.7rem] sm:text-[0.8rem] font-bold text-emerald-700">軸 2 傾角 $\beta$ ($^\circ$):</label>
                            <input type="number" id="resAxis2" value="90" step="1" class="w-full border border-emerald-200 bg-emerald-50 rounded-lg p-1.5 text-xs sm:text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none input-trigger">
                        </div>
                    </div>

                    <div class="mt-auto bg-slate-50 p-2.5 sm:p-3 rounded-lg border-l-4 border-slate-400 shadow-inner flex-shrink-0" id="resResultBox">
                        <strong id="resResultTitle" class="text-xs sm:text-sm text-slate-800">分量結果:</strong>
                        <div id="resOutput" class="mt-1 text-xs sm:text-sm font-semibold text-slate-700 leading-relaxed">
                            </div>
                    </div>
                </div>

                <button id="replayBtn" class="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 disabled:bg-slate-300 disabled:opacity-60 disabled:cursor-not-allowed text-white font-bold py-2 px-4 rounded-lg transition-colors text-xs sm:text-sm shadow-sm active:scale-95 flex-shrink-0" disabled>重播</button>

            </div>
        </aside>

        <section class="flex-1 relative canvas-bg" id="canvasContainer">
            <canvas id="vectorCanvas" class="absolute top-0 left-0 w-full h-full cursor-crosshair"></canvas>
        </section>
    </main>

    <footer id="footerText" class="bg-slate-800 text-slate-300 flex items-center justify-center h-10 text-xs sm:text-sm tracking-widest flex-shrink-0 z-20">
        廠商會中學．物理科
    </footer>

    <div id="helpModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full p-5 sm:p-6 relative flex flex-col max-h-[85vh]">
            <button id="closeModal" class="absolute top-4 right-4 text-slate-400 hover:text-slate-800 text-2xl leading-none">&times;</button>
            <h2 id="modalTitle" class="text-lg sm:text-xl font-bold text-[#1e3c72] mb-3 sm:mb-4">向量操作說明</h2>
            <div id="modalBody" class="overflow-y-auto custom-scrollbar text-slate-700 text-xs sm:text-sm leading-relaxed">
                </div>
        </div>
    </div>

    <script>
        /* --- 1. 視覺配色與全局常量配置 --- */
        const VECTOR_COLORS = ['#2563EB', '#059669', '#D97706', '#7C3AED', '#0D9488', '#DB2777', '#4F46E5', '#65A30D'];
        const RESULTANT_COLOR = '#DC2626';

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        /* --- 2. 多語言本地化系統 (i18n) --- */
        let isEnglish = false;
        const translations = {
            zh: {
                title: "力學向量加法與分解",
                help: "說明",
                tabAdd: "加法", 
                tabRes: "分解",
                modeLabel: "顯示方式:", 
                magLabel: "大小 $F$ (N):", 
                angleLabel: "角度 $\\theta$ ($^\\circ$):",
                add: "加入", 
                clear: "清除", 
                replay: "重播動畫",
                resultTitle: "合力:",
                resVectorLabel: "待分解的力:", 
                resMagLabel: "大小 $F$ (N):", 
                resAngleLabel: "角度 $\\theta$ ($^\\circ$):",
                resAxesLabel: "分解方向:", 
                axis1Label: "軸 1 傾角 $\\alpha$ ($^\\circ$):", 
                axis2Label: "軸 2 傾角 $\\beta$ ($^\\circ$):",
                resResultTitle: "分量結果:",
                footer: "廠商會中學．物理科",
                modalTitle: "向量操作說明",
                modalBody: `<p class="mb-2 font-bold text-blue-800">【加法模式】</p>
                <ol class="list-decimal pl-5 space-y-1 mb-3 text-slate-600">
                    <li>輸入大小與角度，然後點擊「加入」增加向量。</li>
                    <li><strong>首尾相接 / 平行四邊形</strong>：系統會以動畫展示對應的幾何向量加法。</li>
                    <li>最終合力一律以<strong>紅色粗箭頭</strong>表示。</li>
                </ol>
                <p class="mb-2 font-bold text-indigo-800">【分解模式】</p>
                <ol class="list-decimal pl-5 space-y-1 mb-3 text-slate-600">
                    <li>在待分解區輸入主力的強度與角度。</li>
                    <li>自訂軸 1 與軸 2 的傾角 $\\alpha$ 及 $\\beta$（兩軸不能平行）。</li>
                    <li>系統會自動演示力的動態幾何分解過程。若計算值為負，代表該分量指向定義軸的反方向。</li>
                </ol>
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 mt-2">
                    <p class="font-bold mb-1 text-slate-800">分解數學公式 (正弦定理)：</p>
                    <div class="text-center overflow-x-auto text-xs py-1">
                        $$F_1 = F \\frac{\\sin(\\beta - \\theta)}{\\sin(\\beta - \\alpha)}$$
                        $$F_2 = F \\frac{\\sin(\\theta - \\alpha)}{\\sin(\\beta - \\alpha)}$$
                        <p class="mt-1 text-slate-500">($\\theta$: 向量角度, $\\alpha, \\beta$: 兩軸傾角)</p>
                    </div>
                </div>`,
                vectorText: "向量",
                optHeadToTail: "首尾相接法則",
                optParallelogram: "平行四邊形法則",
                errParallel: "無法分解：兩軸互相平行！",
                compAlongAxis1: "(沿軸 1)",
                compAlongAxis2: "(沿軸 2)"
            },
            en: {
                title: "Force Vector Operations",
                help: "Help",
                tabAdd: "Addition", 
                tabRes: "Resolution",
                modeLabel: "Visualization:", 
                magLabel: "Magnitude $F$ (N):", 
                angleLabel: "Angle $\\theta$ ($^\\circ$):",
                add: "Add", 
                clear: "Clear", 
                replay: "Replay Animation",
                resultTitle: "Resultant:",
                resVectorLabel: "Force to Resolve:", 
                resMagLabel: "Mag $F$ (N):", 
                resAngleLabel: "Angle $\\theta$ ($^\\circ$):",
                resAxesLabel: "Arbitrary Axes:", 
                axis1Label: "Axis 1 Inclination $\\alpha$ ($^\\circ$):", 
                axis2Label: "Axis 2 Inclination $\\beta$ ($^\\circ$):",
                resResultTitle: "Components:",
                footer: "CMA Secondary School. Physics Department.",
                modalTitle: "Vector Operations Guide",
                modalBody: `<p class="mb-2 font-bold text-blue-800">【Addition Mode】</p>
                <ol class="list-decimal pl-5 space-y-1 mb-3 text-slate-600">
                    <li>Input magnitude and angle, then click "Add" to submit vectors.</li>
                    <li><strong>Polygon / Parallelogram Rule</strong>: Animated geometric addition demonstration.</li>
                    <li>The final resultant is always drawn as a <strong>thick red arrow</strong>.</li>
                </ol>
                <p class="mb-2 font-bold text-indigo-800">【Resolution Mode】</p>
                <ol class="list-decimal pl-5 space-y-1 mb-3 text-slate-600">
                    <li>Enter the force and inclination of the main vector in the resolve card.</li>
                    <li>Specify non-parallel inclinations $\\alpha$ and $\\beta$ for Axis 1 & 2.</li>
                    <li>The system dynamically recalculates and animates components along specified axes.</li>
                </ol>
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 mt-2">
                    <p class="font-bold mb-1 text-slate-800">Resolution Formula (Sine Rule):</p>
                    <div class="text-center overflow-x-auto text-xs py-1">
                        $$F_1 = F \\frac{\\sin(\\beta - \\theta)}{\\sin(\\beta - \\alpha)}$$
                        $$F_2 = F \\frac{\\sin(\\theta - \\alpha)}{\\sin(\\beta - \\alpha)}$$
                        <p class="mt-1 text-slate-500">($\\theta$: Vector angle, $\\alpha, \\beta$: Axis inclinations)</p>
                    </div>
                </div>`,
                vectorText: "Vector",
                optHeadToTail: "Polygon Rule",
                optParallelogram: "Parallelogram Rule",
                errParallel: "Cannot resolve: Parallel axes!",
                compAlongAxis1: "(along Axis 1)",
                compAlongAxis2: "(along Axis 2)"
            }
        };

        const tMap = {
            titleText: 'title', helpBtn: 'help', 
            tabAddition: 'tabAdd', tabResolution: 'tabRes',
            modeLabel: 'modeLabel', magLabel: 'magLabel', angleLabel: 'angleLabel', 
            addBtn: 'add', clearBtn: 'clear', replayBtn: 'replay', resultTitle: 'resultTitle', 
            resVectorLabel: 'resVectorLabel', resMagLabel: 'resMagLabel', resAngleLabel: 'resAngleLabel',
            resAxesLabel: 'resAxesLabel', axis1Label: 'axis1Label', axis2Label: 'axis2Label',
            resResultTitle: 'resResultTitle', footerText: 'footer', modalTitle: 'modalTitle', modalBody: 'modalBody',
            optHeadToTail: 'optHeadToTail', optParallelogram: 'optParallelogram'
        };

        /* --- 3. 全局應用程式狀態管理 --- */
        let appMode = 'addition'; 
        let vectors = [];
        let scale = 10;
        let originX = 0, originY = 0;
        let cw = 0, ch = 0; 
        
        let resData = { F: 20, theta: 60, a1: 0, a2: 90, F1: 0, F2: 0, parallel: false };

        /* --- 4. 畫布初始化與螢幕適應系統 --- */
        const canvas = document.getElementById('vectorCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const replayBtn = document.getElementById('replayBtn');

        let animId = null;
        let animStartTime = 0;
        let animElements = [];
        let maxAnimTimeT = 0;
        const STAGE_DURATION_MS = 800; // 每個動畫階段歷時 800ms

        function renderMath(elements) {
            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise(elements).catch(e => console.log(e.message));
            }
        }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            cw = container.clientWidth;
            ch = container.clientHeight;
            
            if (cw <= 0 || ch <= 0) return;

            canvas.width = cw * dpr;
            canvas.height = ch * dpr;
            
            ctx.resetTransform();
            ctx.scale(dpr, dpr);

            triggerDraw();
        }

        const resizeObserver = new ResizeObserver(() => { resizeCanvas(); });
        resizeObserver.observe(container);

        /* --- 5. 分頁切換與力學運算核心邏輯 --- */
        document.getElementById('tabAddition').addEventListener('click', () => switchMode('addition'));
        document.getElementById('tabResolution').addEventListener('click', () => switchMode('resolution'));

        function switchMode(mode) {
            appMode = mode;
            const tAdd = document.getElementById('tabAddition');
            const tRes = document.getElementById('tabResolution');
            const uiAdd = document.getElementById('uiAddition');
            const uiRes = document.getElementById('uiResolution');

            if (mode === 'addition') {
                tAdd.className = "flex-1 py-3 text-sm font-bold tab-active transition-colors active:bg-slate-100";
                tRes.className = "flex-1 py-3 text-sm font-bold tab-inactive transition-colors active:bg-slate-100";
                uiAdd.classList.remove('hidden'); uiAdd.classList.add('flex');
                uiRes.classList.remove('flex'); uiRes.classList.add('hidden');
            } else {
                tRes.className = "flex-1 py-3 text-sm font-bold tab-active transition-colors active:bg-slate-100";
                tAdd.className = "flex-1 py-3 text-sm font-bold tab-inactive transition-colors active:bg-slate-100";
                uiRes.classList.remove('hidden'); uiRes.classList.add('flex');
                uiAdd.classList.remove('flex'); uiAdd.classList.add('hidden');
                updateResolutionLogic(); 
            }
            triggerDraw();
        }

        document.querySelectorAll('.input-trigger').forEach(el => {
            el.addEventListener('input', () => {
                if(appMode === 'resolution') updateResolutionLogic();
            });
        });

        function updateResolutionLogic() {
            const F = parseFloat(document.getElementById('resMagnitude').value) || 0;
            const thetaDeg = parseFloat(document.getElementById('resAngle').value) || 0;
            const a1Deg = parseFloat(document.getElementById('resAxis1').value) || 0;
            const a2Deg = parseFloat(document.getElementById('resAxis2').value) || 0;

            const rad = Math.PI / 180;
            const theta = thetaDeg * rad;
            const a1 = a1Deg * rad;
            const a2 = a2Deg * rad;

            const det = Math.sin(a2 - a1);
            resData = { F, theta, a1, a2, thetaDeg, a1Deg, a2Deg, F1: 0, F2: 0, parallel: false };

            const outBox = document.getElementById('resOutput');
            const t = isEnglish ? translations.en : translations.zh;

            if (Math.abs(det) < 0.0001) {
                resData.parallel = true;
                outBox.innerHTML = `<span class="text-red-600 font-semibold">${t.errParallel}</span>`;
            } else {
                resData.F1 = F * Math.sin(a2 - theta) / det;
                resData.F2 = F * Math.sin(theta - a1) / det;
                
                outBox.innerHTML = `
                    <div class="flex items-center text-blue-700">
                        <span class="w-2.5 h-2.5 rounded-full inline-block mr-2 bg-[${VECTOR_COLORS[0]}]"></span>
                        $F_1 = ${resData.F1.toFixed(2)} \\text{ N}$ <span class="text-xs text-slate-500 ml-1.5">${t.compAlongAxis1}</span>
                    </div>
                    <div class="flex items-center text-emerald-700 mt-1.5">
                        <span class="w-2.5 h-2.5 rounded-full inline-block mr-2 bg-[${VECTOR_COLORS[1]}]"></span>
                        $F_2 = ${resData.F2.toFixed(2)} \\text{ N}$ <span class="text-xs text-slate-500 ml-1.5">${t.compAlongAxis2}</span>
                    </div>
                `;
                renderMath([outBox]);
            }
            triggerDraw();
        }

        /* --- 6. 自動縮放與 CSS 網格對齊系統 --- */
        function updateViewport() {
            let minX = 0, maxX = 0, minY = 0, maxY = 0;
            const addPt = (x, y) => {
                if (x < minX) minX = x; if (x > maxX) maxX = x;
                if (y < minY) minY = y; if (y > maxY) maxY = y;
            };
            addPt(0, 0);

            if (appMode === 'addition' && vectors.length > 0) {
                const modeInput = document.querySelector('input[name="visMode"]:checked');
                const mode = modeInput ? modeInput.value : 'head-to-tail';

                if (mode === 'head-to-tail') {
                    let px = 0, py = 0;
                    vectors.forEach((v, i) => {
                        let vx = v.mag * Math.cos(v.rad), vy = v.mag * Math.sin(v.rad);
                        addPt(px + vx, py + vy);
                        px += vx; py += vy;
                    });
                    addPt(px, py);
                } else if (mode === 'parallelogram') {
                    let curX = 0, curY = 0;
                    vectors.forEach((v, i) => {
                        let vx = v.mag * Math.cos(v.rad), vy = v.mag * Math.sin(v.rad);
                        addPt(vx, vy);
                        if (i > 0) addPt(curX + vx, curY + vy);
                        curX += vx; curY += vy;
                    });
                    addPt(curX, curY);
                }
            } else if (appMode === 'resolution' && !resData.parallel && resData.F > 0) {
                addPt(resData.F * Math.cos(resData.theta), resData.F * Math.sin(resData.theta));
                addPt(resData.F1 * Math.cos(resData.a1), resData.F1 * Math.sin(resData.a1));
                addPt(resData.F2 * Math.cos(resData.a2), resData.F2 * Math.sin(resData.a2));
            }

            const padding = 55; 
            let dw = maxX - minX, dh = maxY - minY;
            if (dw < 0.1) dw = 0.1; if (dh < 0.1) dh = 0.1;

            let usableW = Math.max(10, cw - padding * 2);
            let usableH = Math.max(10, ch - padding * 2);

            let scaleX = usableW / dw;
            let scaleY = usableH / dh;
            scale = Math.min(scaleX, scaleY);
            
            if (scale > 300) scale = 300;
            if (scale < 0.5) scale = 0.5;

            const mathCenterX = (minX + maxX) / 2;
            const mathCenterY = (minY + maxY) / 2;

            originX = cw / 2 - mathCenterX * scale;
            originY = ch / 2 + mathCenterY * scale;

            container.style.backgroundPosition = `${originX}px ${originY}px`;
        }

        const getCanvasX = (mathX) => originX + mathX * scale;
        const getCanvasY = (mathY) => originY - mathY * scale;

        /* --- 7. 向量箭頭與輔助線繪製底層 --- */
        function drawArrow(x0, y0, x1, y1, color, width = 2, dashed = false, showHead = true, progress = 1, alpha = 1) {
            if (progress <= 0) return;
            ctx.save(); ctx.globalAlpha = alpha;
            let currX = x0 + (x1 - x0) * progress;
            let currY = y0 + (y1 - y0) * progress;

            ctx.beginPath();
            ctx.moveTo(x0, y0); ctx.lineTo(currX, currY);
            ctx.strokeStyle = color; ctx.lineWidth = width;
            if (dashed) ctx.setLineDash([6, 6]);
            ctx.stroke();

            const dist = Math.hypot(currX - x0, currY - y0);
            if (showHead && !dashed && dist > 1) {
                const angle = Math.atan2(y1 - y0, x1 - x0);
                const headLen = Math.max(12, width * 3.5); 
                ctx.beginPath();
                ctx.moveTo(currX, currY);
                ctx.lineTo(currX - headLen * Math.cos(angle - Math.PI / 6), currY - headLen * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(currX - headLen * Math.cos(angle + Math.PI / 6), currY - headLen * Math.sin(angle + Math.PI / 6));
                ctx.closePath();
                ctx.fillStyle = color; ctx.fill();
            }
            ctx.restore();
        }

        function drawInfiniteLine(angleRad, color) {
            const r = Math.max(cw, ch) * 2;
            const dx = r * Math.cos(angleRad), dy = r * Math.sin(angleRad);
            ctx.beginPath();
            ctx.moveTo(originX - dx, originY + dy);
            ctx.lineTo(originX + dx, originY - dy);
            ctx.strokeStyle = color; ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        /* --- 8. 動態重繪控制器 --- */
        function triggerDraw() {
            updateViewport();
            
            if (appMode === 'resolution') {
                if (resData.F > 0) {
                    replayBtn.disabled = false;
                    startAnimation();
                } else {
                    ctx.clearRect(0, 0, cw, ch);
                    replayBtn.disabled = true;
                }
            } else { 
                if (vectors.length > 0) {
                    replayBtn.disabled = false;
                    startAnimation();
                } else {
                    ctx.clearRect(0, 0, cw, ch);
                    replayBtn.disabled = true;
                }
            }
        }

        /* --- 9. 多功能動畫構造與渲染引擎 --- */
        function buildAnimationElements() {
            animElements = []; maxAnimTimeT = 0;
            
            if (appMode === 'addition') {
                if (vectors.length === 0) return;
                const modeInput = document.querySelector('input[name="visMode"]:checked');
                const mode = modeInput ? modeInput.value : 'head-to-tail';

                if (mode === 'head-to-tail') {
                    let pMathX = 0, pMathY = 0;
                    let resultantStartTime = vectors.length;

                    vectors.forEach((v, i) => {
                        const color = VECTOR_COLORS[i % VECTOR_COLORS.length];
                        const vMathX = v.mag * Math.cos(v.rad), vMathY = v.mag * Math.sin(v.rad);
                        const pCanX = getCanvasX(pMathX), pCanY = getCanvasY(pMathY);
                        const nCanX = getCanvasX(pMathX + vMathX), nCanY = getCanvasY(pMathY + vMathY);

                        animElements.push({ type: 'arrow', x0: pCanX, y0: pCanY, x1: nCanX, y1: nCanY, color, width: 2.5, dashed: false, showHead: true, tStart: i, tFade: resultantStartTime });
                        pMathX += vMathX; pMathY += vMathY;
                    });
                    animElements.push({ type: 'arrow', x0: originX, y0: originY, x1: getCanvasX(pMathX), y1: getCanvasY(pMathY), color: RESULTANT_COLOR, width: 4.5, dashed: false, showHead: true, tStart: vectors.length, tFade: Infinity });
                    maxAnimTimeT = vectors.length + 1;

                } else if (mode === 'parallelogram') {
                    let cMathX = vectors[0].mag * Math.cos(vectors[0].rad), cMathY = vectors[0].mag * Math.sin(vectors[0].rad);
                    let fadeT_V0 = (vectors.length > 1) ? 4 : Infinity;
                    animElements.push({ type: 'arrow', x0: originX, y0: originY, x1: getCanvasX(cMathX), y1: getCanvasY(cMathY), color: VECTOR_COLORS[0], width: 2.5, dashed: false, showHead: true, tStart: 0, tFade: fadeT_V0 });

                    if (vectors.length === 1) { maxAnimTimeT = 1; return; }

                    for (let i = 1; i < vectors.length; i++) {
                        let tBase = (i - 1) * 3;
                        let vMathX = vectors[i].mag * Math.cos(vectors[i].rad), vMathY = vectors[i].mag * Math.sin(vectors[i].rad);
                        let isFinal = (i === vectors.length - 1);
                        let fadeT = isFinal ? Infinity : tBase + 4;
                        const colorVi = VECTOR_COLORS[i % VECTOR_COLORS.length];

                        animElements.push({ type: 'arrow', x0: originX, y0: originY, x1: getCanvasX(vMathX), y1: getCanvasY(vMathY), color: colorVi, width: 2.5, dashed: false, showHead: true, tStart: tBase + 1, tFade: fadeT });
                        animElements.push({ type: 'arrow', x0: getCanvasX(cMathX), y0: getCanvasY(cMathY), x1: getCanvasX(cMathX + vMathX), y1: getCanvasY(cMathY + vMathY), color: hexToRgba(colorVi, 0.4), width: 2, dashed: true, showHead: false, tStart: tBase + 2, tFade: fadeT });
                        animElements.push({ type: 'arrow', x0: getCanvasX(vMathX), y0: getCanvasY(vMathY), x1: getCanvasX(cMathX + vMathX), y1: getCanvasY(cMathY + vMathY), color: 'rgba(148, 163, 184, 0.7)', width: 2, dashed: true, showHead: false, tStart: tBase + 2, tFade: fadeT });

                        cMathX += vMathX; cMathY += vMathY;
                        let rFadeT = isFinal ? Infinity : tBase + 7;
                        animElements.push({ type: 'arrow', x0: originX, y0: originY, x1: getCanvasX(cMathX), y1: getCanvasY(cMathY), color: isFinal ? RESULTANT_COLOR : 'rgba(239, 68, 68, 0.5)', width: isFinal ? 4.5 : 3, dashed: false, showHead: true, tStart: tBase + 3, tFade: rFadeT });
                        maxAnimTimeT = tBase + 4;
                    }
                }
            } 
            else if (appMode === 'resolution') {
                if (resData.F <= 0) return;

                const mX = resData.F * Math.cos(resData.theta), mY = resData.F * Math.sin(resData.theta);
                
                // 階段 0 (t=0~1): 主力(紅箭頭)延展生長
                animElements.push({ type: 'arrow', x0: originX, y0: originY, x1: getCanvasX(mX), y1: getCanvasY(mY), color: RESULTANT_COLOR, width: 4.5, dashed: false, showHead: true, tStart: 0, tFade: Infinity });
                
                if (resData.parallel) {
                    maxAnimTimeT = 1;
                    return;
                }

                const c1X = resData.F1 * Math.cos(resData.a1), c1Y = resData.F1 * Math.sin(resData.a1);
                const c2X = resData.F2 * Math.cos(resData.a2), c2Y = resData.F2 * Math.sin(resData.a2);

                // 階段 1 (t=1~2): 分解軸線虛線淡入
                animElements.push({ type: 'infiniteLine', angle: resData.a1, color: hexToRgba(VECTOR_COLORS[0], 0.3), tStart: 1, tFade: Infinity });
                animElements.push({ type: 'infiniteLine', angle: resData.a2, color: hexToRgba(VECTOR_COLORS[1], 0.3), tStart: 1, tFade: Infinity });

                // 階段 2 (t=2~3): 平行四邊形分量投影對齊虛線延伸
                animElements.push({ type: 'arrow', x0: getCanvasX(c1X), y0: getCanvasY(c1Y), x1: getCanvasX(mX), y1: getCanvasY(mY), color: hexToRgba(VECTOR_COLORS[1], 0.4), width: 1.5, dashed: true, showHead: false, tStart: 2, tFade: Infinity });
                animElements.push({ type: 'arrow', x0: getCanvasX(c2X), y0: getCanvasY(c2Y), x1: getCanvasX(mX), y1: getCanvasY(mY), color: hexToRgba(VECTOR_COLORS[0], 0.4), width: 1.5, dashed: true, showHead: false, tStart: 2, tFade: Infinity });

                // 階段 3 (t=3~4): 沿著指定軸向生長出最終的分量實體箭頭
                animElements.push({ type: 'arrow', x0: originX, y0: originY, x1: getCanvasX(c1X), y1: getCanvasY(c1Y), color: VECTOR_COLORS[0], width: 3, dashed: false, showHead: true, tStart: 3, tFade: Infinity });
                animElements.push({ type: 'arrow', x0: originX, y0: originY, x1: getCanvasX(c2X), y1: getCanvasY(c2Y), color: VECTOR_COLORS[1], width: 3, dashed: false, showHead: true, tStart: 3, tFade: Infinity });

                maxAnimTimeT = 4;
            }
        }

        function startAnimation() {
            if (animId) cancelAnimationFrame(animId);
            buildAnimationElements();
            animStartTime = Date.now();
            animateLoop();
        }

        function animateLoop() {
            ctx.clearRect(0, 0, cw, ch);
            let currentTimeT = (Date.now() - animStartTime) / STAGE_DURATION_MS;

            animElements.forEach(el => {
                if (currentTimeT >= el.tStart) {
                    let progress = Math.min(1, currentTimeT - el.tStart);
                    let alpha = 1;
                    if (currentTimeT >= el.tFade) {
                        let fadeProgress = Math.min(1, currentTimeT - el.tFade);
                        alpha = 1 - (fadeProgress * 0.8);
                    }
                    
                    if (el.type === 'infiniteLine') {
                        ctx.save();
                        ctx.globalAlpha = progress; // 隨時間均勻淡入
                        drawInfiniteLine(el.angle, el.color);
                        ctx.restore();
                    } else {
                        drawArrow(el.x0, el.y0, el.x1, el.y1, el.color, el.width, el.dashed, el.showHead, progress, alpha);
                    }
                }
            });
            if (currentTimeT < maxAnimTimeT + 1) animId = requestAnimationFrame(animateLoop);
        }

        /* --- 10. 使用者互動控制與初始化監聽器 --- */
        function updateVectorList() {
            const listDiv = document.getElementById('vectorList');
            listDiv.innerHTML = '';
            const t = isEnglish ? translations.en : translations.zh;
            
            let sx = 0, sy = 0;
            vectors.forEach((v, i) => {
                sx += v.mag * Math.cos(v.rad); sy += v.mag * Math.sin(v.rad);
                const color = VECTOR_COLORS[i % VECTOR_COLORS.length];
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center bg-white p-2 border border-slate-200 rounded-lg shadow-sm text-xs sm:text-sm';
                
                div.innerHTML = `
                    <div class="flex items-center min-w-0 mr-2">
                        <span class="w-2.5 h-2.5 rounded-full inline-block mr-2 shadow-inner flex-shrink-0 border border-black/10" style="background-color: ${color};"></span>
                        <span class="font-bold text-slate-700 truncate">${t.vectorText} ${i+1}: <span class="text-slate-600 font-medium ml-1"> $${v.mag} \\text{ N}, ${v.angle}^\\circ$ </span></span>
                    </div>
                    <button class="text-red-400 hover:text-red-700 hover:bg-red-50 px-2 py-1 rounded-lg transition-colors font-bold text-lg leading-none active:scale-95" onclick="removeVec(${i})">×</button>
                `;
                listDiv.appendChild(div);
            });

            const rMag = Math.sqrt(sx*sx + sy*sy);
            let rAng = Math.atan2(sy, sx) * 180 / Math.PI;
            if (rAng < 0) rAng += 360;

            const resOut = document.getElementById('resultOutput');
            if (vectors.length > 0) {
                resOut.innerHTML = `$R = ${rMag.toFixed(2)} \\text{ N}$ <br> $\\theta = ${rAng.toFixed(1)}^\\circ$`;
            } else {
                resOut.innerHTML = `$R = 0.00 \\text{ N}$ <br> $\\theta = 0.0^\circ$`;
            }
            
            renderMath([listDiv, resOut]);
        }

        window.removeVec = (i) => { vectors.splice(i, 1); updateVectorList(); triggerDraw(); };

        document.getElementById('addBtn').addEventListener('click', () => {
            const m = parseFloat(document.getElementById('magnitude').value), a = parseFloat(document.getElementById('angle').value);
            if (!isNaN(m) && !isNaN(a) && m > 0) {
                vectors.push({ mag: m, angle: a, rad: a * Math.PI / 180 });
                updateVectorList(); triggerDraw();
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => { vectors = []; updateVectorList(); triggerDraw(); });
        replayBtn.addEventListener('click', startAnimation);
        
        document.querySelectorAll('input[name="visMode"]').forEach(radio => {
            radio.addEventListener('change', triggerDraw);
        });

        document.getElementById('langBtn').addEventListener('click', () => {
            isEnglish = !isEnglish;
            updateLanguageUI();
        });

        function updateLanguageUI() {
            const t = isEnglish ? translations.en : translations.zh;
            for (const [id, key] of Object.entries(tMap)) {
                const el = document.getElementById(id);
                if(el) el.innerHTML = t[key];
            }

            updateVectorList();
            if (appMode === 'resolution') updateResolutionLogic();
            
            renderMath([document.body]); 
        }

        const modal = document.getElementById('helpModal');
        document.getElementById('helpBtn').addEventListener('click', () => {
            modal.classList.remove('hidden');
            renderMath([document.getElementById('modalBody')]);
        });
        document.getElementById('closeModal').addEventListener('click', () => modal.classList.add('hidden'));
        window.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });

        window.onload = () => {
            updateLanguageUI(); 
            resizeCanvas();     
            switchMode('addition'); 
        };
    </script>
</body>
