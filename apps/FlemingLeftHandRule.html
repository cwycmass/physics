    <script>
        /* --- 1. State & Bilingual Logic --- */
        let lang = 'zh', score = 0, solved = false;
        let currentAngleToI = 90;

        let layoutOffset = 2.0;
        
        let targetQuaternion = null;

        let isAnimatingHand = false;
        let currentOffsets = { F: new THREE.Vector3(), B: new THREE.Vector3(), I: new THREE.Vector3() };
        let crossGroup = null;
        
        // SAFE COLORS: Exclude Red, Green, Yellow to prevent color matching
        const SAFE_COLORS = ['#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4', '#6366f1', '#14b8a6', '#d946ef', '#0ea5e9', '#475569', '#334155'];

        const DICT = {

                slThumb: "Rotate about Thumb", slIndex: "Rotate about Index", slMiddle: "Rotate about Middle",
                btnReset: "Reset", lblTarget: "Target", lblFound: "%s Found!", texPalm: "PALM", texBack: "BACK",
                toastSuccess: "Excellent! +10 pts.", toastFail: "Incorrect! -1 pt.",
                toastZeroSuccess: "Excellent! Force is zero (+10 pts).", toastZeroFail: "Incorrect! Force is not zero (-1 pt).",

                modalText: `
                    <p>Fleming's Left-Hand Rule determines the direction of magnetic force on a current-carrying wire.</p>
                    <ul class="list-none pl-2 mt-2 space-y-2 border-l-2 border-[#1e3c72] ml-2">
                        <li><span class="text-[#DC2626] font-bold">Thumb</span> = Magnetic Force ($F$)</li>
                        <li><span class="text-[#10B981] font-bold">Index</span> = Magnetic Field ($B$)</li>
                        <li><span class="text-[#F59E0B] font-bold">Middle</span> = Current ($I$)</li>
                    </ul>
                    <p class="mt-3"><b>Your Task:</b></p>
                    <p>Observe the target symbols. Vectors along the paper are solid lines. <br>Vectors going <b>Into Paper</b> are marked with $\\otimes$. <br>Vectors coming <b>Out of Paper</b> are marked with $\\odot$.</p>
                    <p>Rotate the 3D mannequin hand using the sliders or by dragging until its colored fingertips align with these symbols. Notice the "PALM" and "BACK" labels to help orient the hand. Click "Check Alignment" to verify!</p>
                    <p class="mt-2 text-emerald-700 font-medium">If $B$ and $I$ are parallel, force $F$ is zero. In this case, click the <b><i>F</i> = 0</b> button instead.</p>
                    <p class="mt-1 text-emerald-700 font-medium">If $B$ and $I$ are not $90^{\\circ}$ apart, align the middle finger to $I$ and the index finger to the perpendicular component of $B$.</p>
                `,
                modalBtn: "Start Learning", footer: "CMA Secondary School. Physics Department.",
                dirRight: "Right", dirLeft: "Left", dirUp: "Up", dirDown: "Down", dirOut: "Out of Paper ($\\odot$)", dirIn: "Into Paper ($\\otimes$)",
                dirAngle: "%a° to I"
            },
            zh: {
                title: "弗林明左手定則", subtitle: "3D 真實模擬挑戰",
                scoreLabel: "分數", objective: "旋轉 3D 左手模型，與向量對齊！",
                givenTitle: "已知條件",
                controlsTitle: "微調旋轉",
                btnCheck: "檢查對齊情況", btnSkip: "跳過 / 產生新題目 (-5分)", btnZero: "<i>F</i> = 0",
                btnNext: "下一題", toastSkip: "已跳過 (-5分)。",
                toastSkipZero: "已跳過 (-5分)。正確答案：磁力為零。",
                slThumb: "沿拇指旋轉", slIndex: "沿食指旋轉", slMiddle: "沿中指旋轉",
                btnReset: "重設姿勢", lblTarget: "目標", lblFound: "已找到 %s！", texPalm: "掌心", texBack: "手背",
                toastSuccess: "太棒了！+10 分。", toastFail: "方向未對齊！-1 分。",
                toastZeroSuccess: "太棒了！磁力為零，得 10 分。", toastZeroFail: "錯誤！磁力不為零，扣 1 分。",
                modalTitle: "遊戲玩法與說明",
                modalText: `
                    <p>弗林明左手定則用於判斷載流導線在磁場中所受磁力的方向：</p>
                    <ul class="list-none pl-2 mt-2 space-y-2 border-l-2 border-[#1e3c72] ml-2">
                        <li><span class="text-[#DC2626] font-bold">拇指</span> = 磁力方向 ($F$)</li>
                        <li><span class="text-[#10B981] font-bold">食指</span> = 磁場方向 ($B$)</li>
                        <li><span class="text-[#F59E0B] font-bold">中指</span> = 電流方向 ($I$)</li>
                    </ul>
                    <p class="mt-3"><b>你的任務：</b></p>
                    <p>觀察畫面上的目標符號。沿著紙面的向量以實線表示。<br><b>穿出紙面</b>的向量以 $\\odot$ 符號表示。<br><b>穿入紙面</b>的向量以 $\\otimes$ 符號表示。</p>
                    <p>請使用滑桿或拖曳來旋轉 3D 左手模型，直到指尖與環境符號完美對齊。可以參考手掌上的 "PALM" (掌心) 和 "BACK" (手背) 標記來確認方向。完成後點擊「檢查對齊情況」！</p>
                    <p class="mt-2 text-emerald-700 font-medium">如果 $B$ 與 $I$ 平行，則磁力 $F$ 為零。此時請點擊 <b><i>F</i> = 0</b> 按鈕。</p>
                    <p class="mt-1 text-emerald-700 font-medium">如果 $B$ 與 $I$ 的夾角不是 $90^{\\circ}$，請將中指對齊 $I$，並將食指對齊 $B$ 的垂直分量。</p>
                `,
                modalBtn: "開始學習", footer: "廠商會中學．物理科",
                dirRight: "向右", dirLeft: "向左", dirUp: "向上", dirDown: "向下", dirOut: "穿出紙面 ($\\odot$)", dirIn: "穿入紙面 ($\\otimes$)",
                dirAngle: "與 I 夾 %a°"
            }
        };

        const els = {
            appTitle: document.getElementById('appTitle'), appSubtitle: document.getElementById('appSubtitle'),
            scoreLabel: document.getElementById('scoreLabel'), scoreValue: document.getElementById('scoreValue'),
            objectiveText: document.getElementById('objectiveText'), givenVectorsTitle: document.getElementById('givenVectorsTitle'),
            targetVectorsList: document.getElementById('targetVectorsList'),
            controlsTitle: document.getElementById('controlsTitle'), dragHintText: document.getElementById('dragHintText'),
            btnCheck: document.getElementById('btnCheck'), btnSkip: document.getElementById('btnSkip'), 
            btnReset: document.getElementById('btnReset'), btnZero: document.getElementById('btnZero'),
            slThumb: document.getElementById('slThumb'), slIndex: document.getElementById('slIndex'), slMiddle: document.getElementById('slMiddle'),
            modalTitle: document.getElementById('modalTitle'), modalText: document.getElementById('modalText'),
            modalCloseBtn: document.getElementById('modalCloseBtn'), footerText: document.getElementById('footerText')
        };

        const COLORS = { F: 0xDC2626, B: 0x10B981, I: 0xF59E0B };

        /* --- 2. Three.js Engine & Physics Setup --- */
        let scene, camera, renderer, handGroup, targetGroup, htmlLabels = {};
        let matPalm, matBack;

        const baseVec = {
            F: new THREE.Vector3(-1, 0, 0), // Thumb (Left)
            B: new THREE.Vector3(0, 1, 0),  // Index (Up)
            I: new THREE.Vector3(0, 0, 1)   // Middle (Forward)
        };
        
        let targetState = { F: new THREE.Vector3(), B: new THREE.Vector3(), B_perp: new THREE.Vector3(), I: new THREE.Vector3() };
        let hiddenKey = 'F';
        let currentCameraDir = new THREE.Vector3(0, 0, 1);

        window.onload = () => {
            initThreeJS();
            animate(); 
            generateQuestion();
            updateUI();
            setupSliders();
        };

        function initThreeJS() {
            const container = document.getElementById('canvasContainer');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8fafc); 

            // "Paper" Grid floor mapped to XY Plane
            const gridHelper = new THREE.GridHelper(30, 30, 0x94a3b8, 0xe2e8f0);
            gridHelper.rotation.x = Math.PI / 2; 
            gridHelper.position.z = -0.5; 
            scene.add(gridHelper);

            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight || 1, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2)); 
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0';
            renderer.domElement.style.left = '0';
            renderer.domElement.style.width = '100%';
            renderer.domElement.style.height = '100%';
            renderer.domElement.style.zIndex = '0';
            container.appendChild(renderer.domElement);

            renderer.setSize(container.clientWidth || 500, container.clientHeight || 500, false);

            scene.add(new THREE.AmbientLight(0xffffff, 0.65));
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(5, 5, 8);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024; dirLight.shadow.mapSize.height = 1024;
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0xe2e8f0, 0.4);
            fillLight.position.set(-5, -5, 5);
            scene.add(fillLight);

            handGroup = new THREE.Group();
            scene.add(handGroup);
            buildAnatomicalHand();

            targetGroup = new THREE.Group();
            scene.add(targetGroup);

            // Big Red Cross for F=0
            crossGroup = new THREE.Group();
            const crossMat = new THREE.MeshBasicMaterial({ color: 0xef4444, depthTest: false, transparent: true, opacity: 0.95 });
            const crossGeo = new THREE.CylinderGeometry(0.15, 0.15, 2.5, 16);
            const cross1 = new THREE.Mesh(crossGeo, crossMat);
            cross1.rotation.z = Math.PI / 4;
            cross1.renderOrder = 999;
            const cross2 = new THREE.Mesh(crossGeo, crossMat);
            cross2.rotation.z = -Math.PI / 4;
            cross2.renderOrder = 999;
            crossGroup.add(cross1);
            crossGroup.add(cross2);
            crossGroup.visible = false;
            scene.add(crossGroup);

            camera.userData.lastWidth = 0;
            camera.userData.lastHeight = 0;
            
            updateCameraPosition(); 
            setupInteraction(container);
        }

        function updateCameraPosition(force = false) {
            const container = document.getElementById('canvasContainer');
            if(!container) return;
            const w = container.clientWidth;
            const h = container.clientHeight;
            if (w <= 0 || h <= 0) return; 

            if (!force && camera.userData.lastWidth === w && camera.userData.lastHeight === h) return;
            camera.userData.lastWidth = w;
            camera.userData.lastHeight = h;

            const aspect = w / h;
            camera.aspect = aspect;
            
            const fovRad = camera.fov * Math.PI / 180;
            const viewHeight = 2 * Math.tan(fovRad / 2);
            const viewWidth = viewHeight * aspect;
            
            if (viewWidth <= 0 || viewHeight <= 0) return;

            // Ensure we have at least 12 world units wide to comfortably fit everything side-by-side
            const requiredWorldWidth = (layoutOffset * 2) + 7.0; 
            const requiredWorldHeight = 9.0;

            const requiredDistX = requiredWorldWidth / viewWidth;
            const requiredDistY = requiredWorldHeight / viewHeight;
            const baseDist = 11;
            let dist = Math.max(baseDist, requiredDistX, requiredDistY);
            if (!isFinite(dist)) dist = 12;

            camera.position.copy(currentCameraDir).multiplyScalar(dist);
            camera.lookAt(0, 0, 0);
            camera.updateProjectionMatrix();
            renderer.setSize(w, h, false);

            const scaleFactor = dist / baseDist;
            handGroup.scale.setScalar(scaleFactor);
            handGroup.position.set(layoutOffset * scaleFactor, 0, 0);

            if(crossGroup) {
                crossGroup.scale.setScalar(scaleFactor);
                crossGroup.position.copy(handGroup.position);
                crossGroup.quaternion.copy(camera.quaternion); // Always face the camera directly
            }
        }

        /* --- 3. Procedural Articulated Hand System & Textures --- */
        function createHandTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const d = DICT[lang];

            if (type === 'palm') {
                ctx.fillStyle = '#E8B988'; 
                ctx.fillRect(0, 0, 256, 256);
                ctx.strokeStyle = 'rgba(180, 120, 80, 0.4)';
                ctx.lineWidth = 6; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(60, 250); ctx.quadraticCurveTo(128, 128, 220, 100); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(60, 150); ctx.quadraticCurveTo(128, 100, 220, 60); ctx.stroke();
                ctx.fillStyle = 'rgba(200, 80, 50, 0.8)';
                ctx.font = 'bold 52px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(d.texPalm, 128, 230);
            } else {
                ctx.fillStyle = '#D6A676'; 
                ctx.fillRect(0, 0, 256, 256);
                ctx.fillStyle = 'rgba(180, 100, 60, 0.2)';
                ctx.beginPath(); ctx.arc(64, 50, 25, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(128, 50, 25, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(192, 50, 25, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(200, 80, 50, 0.8)';
                ctx.font = 'bold 52px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(d.texBack, 128, 230);
            }

            const tex = new THREE.CanvasTexture(canvas);
            if(renderer) tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return tex;
        }

        function buildAnatomicalHand() {
            const matSkin = new THREE.MeshStandardMaterial({ color: 0xE8B988, roughness: 0.5, metalness: 0.05 });
            const matF = new THREE.MeshStandardMaterial({ color: COLORS.F, roughness: 0.3, emissive: COLORS.F, emissiveIntensity: 0.2 });
            const matB = new THREE.MeshStandardMaterial({ color: COLORS.B, roughness: 0.3, emissive: COLORS.B, emissiveIntensity: 0.2 });
            const matI = new THREE.MeshStandardMaterial({ color: COLORS.I, roughness: 0.3, emissive: COLORS.I, emissiveIntensity: 0.2 });

            const palmTex = createHandTexture('palm');
            const backTex = createHandTexture('back');
            matPalm = new THREE.MeshStandardMaterial({ map: palmTex, roughness: 0.6, metalness: 0.05 });
            matBack = new THREE.MeshStandardMaterial({ map: backTex, roughness: 0.6, metalness: 0.05 });

            function createFinger(radii, lengths, matTip, rotations) {
                const root = new THREE.Group();
                let current = root;
                for (let i = 0; i < lengths.length; i++) {
                    const joint = new THREE.Group();
                    if (rotations[i]) joint.rotation.set(rotations[i].x||0, rotations[i].y||0, rotations[i].z||0);
                    const mat = (i === lengths.length - 1) ? matTip : matSkin;
                    const rBase = radii[i];
                    const rTop = radii[i+1] || rBase * 0.8;
                    const len = lengths[i];
                    
                    const boneGeo = new THREE.CylinderGeometry(rTop, rBase, len, 16);
                    const bone = new THREE.Mesh(boneGeo, mat);
                    bone.position.y = len / 2; 
                    bone.castShadow = true; bone.receiveShadow = true;
                    joint.add(bone);
                    
                    const knuckleGeo = new THREE.SphereGeometry(rBase * 1.05, 16, 16);
                    const knuckle = new THREE.Mesh(knuckleGeo, matSkin);
                    knuckle.castShadow = true; knuckle.receiveShadow = true;
                    joint.add(knuckle);
                    
                    current.add(joint);
                    const nextLink = new THREE.Group();
                    nextLink.position.y = len;
                    joint.add(nextLink);
                    current = nextLink;
                }
                return root;
            }

            const palmGeo = new THREE.BoxGeometry(1.0, 0.9, 0.25);
            const palmMaterials = [matSkin, matSkin, matSkin, matSkin, matPalm, matBack];
            const palm = new THREE.Mesh(palmGeo, palmMaterials);
            palm.position.set(0, -0.05, 0); 
            palm.castShadow = true; palm.receiveShadow = true;
            handGroup.add(palm);

            const thumb = createFinger([0.14, 0.13, 0.11], [0.4, 0.35], matF, [
                {x: 0, y: 0, z: Math.PI/2}, 
                {x: 0, y: 0, z: 0}
            ]);
            thumb.position.set(-0.5, -0.2, 0.05);
            handGroup.add(thumb);

            const index = createFinger([0.11, 0.1, 0.09, 0.08], [0.45, 0.35, 0.25], matB, [
                {x: 0, y: 0, z: 0}, {x: 0, y: 0, z: 0}, {x: 0, y: 0, z: 0}
            ]);
            index.position.set(-0.3, 0.4, 0);
            handGroup.add(index);

            const middle = createFinger([0.12, 0.11, 0.1, 0.09], [0.5, 0.4, 0.3], matI, [
                {x: Math.PI/2, y: 0, z: 0}, 
                {x: 0, y: 0, z: 0}, {x: 0, y: 0, z: 0}
            ]);
            middle.position.set(-0.05, 0.4, 0);
            handGroup.add(middle);

            const ring = createFinger([0.11, 0.1, 0.09, 0.08], [0.45, 0.35, 0.25], matSkin, [
                {x: Math.PI/2 + 0.3, y: 0, z: 0}, 
                {x: Math.PI/2, y: 0, z: 0}, {x: Math.PI/2, y: 0, z: 0}
            ]);
            ring.position.set(0.2, 0.4, 0);
            handGroup.add(ring);

            const pinky = createFinger([0.09, 0.08, 0.07, 0.06], [0.35, 0.25, 0.2], matSkin, [
                {x: Math.PI/2 + 0.5, y: 0, z: 0}, 
                {x: Math.PI/2, y: 0, z: 0}, {x: Math.PI/2, y: 0, z: 0}
            ]);
            pinky.position.set(0.45, 0.35, 0);
            handGroup.add(pinky);

            handGroup.position.set(0, 0, 0);
        }

        /* --- 4. Game Interaction & Physics Vector Generation --- */
        function setupInteraction(container) {
            let isDragging = false;
            let prevMouse = {x: 0, y: 0};

            const down = (x, y) => { isDragging = true; prevMouse = {x, y}; };
            const up = () => { isDragging = false; };
            const move = (x, y) => {
                if(!isDragging) return;
                let dx = x - prevMouse.x;
                let dy = y - prevMouse.y;
                prevMouse = {x, y};
                handGroup.rotateOnWorldAxis(new THREE.Vector3(0,1,0), dx * 0.01);
                handGroup.rotateOnWorldAxis(new THREE.Vector3(1,0,0), dy * 0.01);
            };

            container.addEventListener('mousedown', e => down(e.clientX, e.clientY));
            window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
            window.addEventListener('mouseup', up);

            container.addEventListener('touchstart', e => down(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
            window.addEventListener('touchmove', e => { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
            window.addEventListener('touchend', up);
        }

        function setupSliders() {
            ['F', 'B', 'I'].forEach(key => {
                const slider = document.getElementById(`slider${key}`);
                if (!slider) return;
                let lastVal = 0;
                
                slider.addEventListener('input', (e) => {
                    let currentVal = parseFloat(e.target.value);
                    let deltaDeg = currentVal - lastVal;
                    let deltaRad = deltaDeg * (Math.PI / 180);
                    lastVal = currentVal;
                    handGroup.rotateOnAxis(baseVec[key], deltaRad);
                });
                
                const resetSlider = () => {
                    slider.value = 0;
                    lastVal = 0;
                    handGroup.quaternion.normalize(); 
                };
                slider.addEventListener('change', resetSlider);
                slider.addEventListener('mouseup', resetSlider);
                slider.addEventListener('touchend', resetSlider);
            });
        }

        function resetHandRotation() {
            handGroup.quaternion.identity();
            ['F', 'B', 'I'].forEach(key => {
                const slider = document.getElementById(`slider${key}`);
                if (slider) slider.value = 0;
            });
        }

        function createTargetVector(dir, colorHex, offset = new THREE.Vector3()) {
            const group = new THREE.Group();
            if (dir.lengthSq() < 0.1) return group; // Safe guard against zero vectors

            const length = currentArrowLength;

            if (Math.abs(dir.z) > 0.99) {
                const isOut = dir.z > 0;
                const mat = new THREE.MeshBasicMaterial({ color: colorHex, side: THREE.DoubleSide, depthTest: false });
                
                const ringGeo = new THREE.RingGeometry(length * 0.25, length * 0.32, 32);
                const ring = new THREE.Mesh(ringGeo, mat);
                group.add(ring);

                if (isOut) {
                    const dotGeo = new THREE.CircleGeometry(length * 0.12, 16);
                    const dot = new THREE.Mesh(dotGeo, mat);
                    group.add(dot);
                } else {
                    const crossGeo1 = new THREE.PlaneGeometry(length * 0.08, length * 0.5);
                    const cross1 = new THREE.Mesh(crossGeo1, mat);
                    cross1.rotation.z = Math.PI / 4;
                    group.add(cross1);

                    const crossGeo2 = new THREE.PlaneGeometry(length * 0.08, length * 0.5);
                    const cross2 = new THREE.Mesh(crossGeo2, mat);
                    cross2.rotation.z = -Math.PI / 4;
                    group.add(cross2);
                }
                
                group.position.set(offset.x, offset.y, (isOut ? 0.2 : -0.2) + offset.z); 
            } else {
                const cylGeo = new THREE.CylinderGeometry(length * 0.04, length * 0.04, length, 12);
                const cylMat = new THREE.MeshBasicMaterial({ color: colorHex });
                const cyl = new THREE.Mesh(cylGeo, cylMat);
                cyl.position.copy(dir.clone().multiplyScalar(length / 2));
                
                let unitDir = dir.clone().normalize();
                if (unitDir.y <= -0.99) cyl.rotation.x = Math.PI;
                else cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), unitDir);
                group.add(cyl);

                const coneGeo = new THREE.ConeGeometry(length * 0.15, length * 0.25, 16);
                const coneMat = new THREE.MeshBasicMaterial({ color: colorHex });
                const cone = new THREE.Mesh(coneGeo, coneMat);
                cone.position.copy(dir.clone().multiplyScalar(length));
                
                if (unitDir.y <= -0.99) cone.rotation.x = Math.PI;
                else cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), unitDir);
                group.add(cone);
                
                group.position.copy(offset);
            }

            return group;
        }

        function generateQuestion() {
            solved = false; isAnimatingHand = false; handGroup.quaternion.identity();
            if(crossGroup) crossGroup.visible = false;

            // RANDOMIZE COLORS: Every vector gets a unique color from safe palette
            let shuffled = [...SAFE_COLORS].sort(() => 0.5 - Math.random());
            ['F', 'B', 'I'].forEach((key, i) => {
                vectorColorsStr[key] = shuffled[i];
                vectorColorsHex[key] = parseInt(shuffled[i].replace('#', '0x'));
            });

            const container = document.getElementById('canvasContainer');
            if (container && container.clientWidth > 0) {
                const minDim = Math.min(container.clientWidth, container.clientHeight);
                currentArrowLength = Math.max(1.2, minDim * 0.0035);
            } else {
                currentArrowLength = 1.5;
            }

            // Randomize camera direction within 30 degrees of normal (Z-axis)
            let phi = Math.random() * (Math.PI / 6); // [0, 30 degrees]
            let theta = Math.random() * 2 * Math.PI; // [0, 360 degrees]
            currentCameraDir = new THREE.Vector3(
                Math.sin(phi) * Math.cos(theta),
                Math.sin(phi) * Math.sin(theta),
                Math.cos(phi)
            ).normalize();

            hiddenKey = ['F', 'B', 'I'][Math.floor(Math.random() * 3)];
            currentAngleToI = 90;

            const axes = [
                new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0),
                new THREE.Vector3(0,1,0), new THREE.Vector3(0,-1,0),
                new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1)
            ];
            const xyAxes = [
                new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0),
                new THREE.Vector3(0,1,0), new THREE.Vector3(0,-1,0)
            ];

            let tI = new THREE.Vector3(), tB = new THREE.Vector3(), tB_perp = new THREE.Vector3(), tF = new THREE.Vector3();

            if (hiddenKey === 'F') {
                const angles = [0, 30, 45, 60, 90];
                currentAngleToI = angles[Math.floor(Math.random() * angles.length)];

                if (currentAngleToI === 90) {
                    tI = axes[Math.floor(Math.random() * axes.length)].clone();
                    let orthogonalAxes = axes.filter(v => Math.abs(v.dot(tI)) < 0.1);
                    tB = orthogonalAxes[Math.floor(Math.random() * orthogonalAxes.length)].clone();
                    tB_perp.copy(tB);
                    tF.crossVectors(tI, tB);
                } else if (currentAngleToI === 0) {
                    tI = axes[Math.floor(Math.random() * axes.length)].clone();
                    tB.copy(tI); 
                    
                    let orthogonalAxes = axes.filter(v => Math.abs(v.dot(tI)) < 0.1);
                    tB_perp = orthogonalAxes[Math.floor(Math.random() * orthogonalAxes.length)].clone();
                    tF.set(0,0,0);
                } else {
                    tI = xyAxes[Math.floor(Math.random() * xyAxes.length)].clone();
                    let rad = currentAngleToI * Math.PI / 180;
                    let sign = Math.random() < 0.5 ? 1 : -1;
                    tB.copy(tI).applyAxisAngle(new THREE.Vector3(0,0,1), sign * rad);
                    tB_perp.copy(tI).applyAxisAngle(new THREE.Vector3(0,0,1), sign * Math.PI / 2).normalize();
                    tF.crossVectors(tI, tB_perp);
                    tB.x = Math.abs(tB.x) < 1e-10 ? 0 : tB.x;
                    tB.y = Math.abs(tB.y) < 1e-10 ? 0 : tB.y;
                }
            } else {
                tI = axes[Math.floor(Math.random() * axes.length)].clone();
                let orthogonalAxes = axes.filter(v => Math.abs(v.dot(tI)) < 0.1);
                tB = orthogonalAxes[Math.floor(Math.random() * orthogonalAxes.length)].clone();
                tB_perp.copy(tB);
                tF.crossVectors(tI, tB);
                currentAngleToI = 90;
            }

            targetState.F = tF.clone().round();
            targetState.B_perp = tB_perp.clone().round();
            targetState.I = tI.clone().round();
            targetState.B = tB.clone(); 

            let basisF = (currentAngleToI === 0) ? new THREE.Vector3().crossVectors(tI, tB_perp) : targetState.F;
            if (basisF.lengthSq() > 0.01 && targetState.B_perp.lengthSq() > 0.01 && targetState.I.lengthSq() > 0.01) {
                let m = new THREE.Matrix4();
                m.makeBasis(basisF.clone().negate().normalize(), targetState.B_perp.clone().normalize(), targetState.I.clone().normalize());
                currentTargetQ.setFromRotationMatrix(m).normalize();
            } else {
                currentTargetQ.identity();
            }

            currentOffsets = { F: new THREE.Vector3(), B: new THREE.Vector3(), I: new THREE.Vector3() };
            if (currentAngleToI === 0) {
                let perp = new THREE.Vector3();
                if (Math.abs(tI.z) > 0.9) perp.set(0.4, 0, 0); 
                else if (Math.abs(tI.x) > 0.9) perp.set(0, 0.4, 0); 
                else perp.set(0.4, 0, 0); 
                
                currentOffsets.B = perp.clone();
                currentOffsets.I = perp.clone().negate();
            }

            let pointsRight = false;
            ['F', 'B', 'I'].forEach(key => {
                if (key !== hiddenKey && targetState[key].x > 0.1) pointsRight = true;
            });
            layoutOffset = pointsRight ? 3.0 : 2.2; 
            targetGroup.position.set(-layoutOffset, 0, 0);
            updateCameraPosition(true); 

            targetGroup.clear();
            document.getElementById('labelsContainer').innerHTML = ''; 
            htmlLabels = {};

            ['F', 'B', 'I'].forEach(key => {
                if (key !== hiddenKey && !(key === 'F' && currentAngleToI === 0)) {
                    targetGroup.add(createTargetVector(targetState[key], vectorColorsHex[key], currentOffsets[key]));
                    createHtmlLabel(key, targetState[key], `${DICT[lang].lblTarget} <i>${key}</i>`, vectorColorsStr[key], currentOffsets[key]);
                }
            });

            updateUI();
        }

        function createHtmlLabel(id, vector3Dir, text, colorStr, offset = new THREE.Vector3()) {
            const div = document.createElement('div');
            div.className = 'vector-label';
            div.style.color = colorStr;
            div.innerHTML = text;
            div.id = `label-${id}`;
            document.getElementById('labelsContainer').appendChild(div);
            
            if (vector3Dir.lengthSq() < 0.1) {
                htmlLabels[id] = { elem: div, localPos: offset.clone(), dir: new THREE.Vector3(), isZ: false };
                return;
            }

            let isZAxis = Math.abs(vector3Dir.z) > 0.99;
            let localPos = new THREE.Vector3();
            if (isZAxis) {
                localPos.set(-0.8, 1.0, vector3Dir.z > 0 ? 0.2 : -0.2); 
            } else {
                localPos.copy(vector3Dir).multiplyScalar(currentArrowLength * 1.15);
            }
            localPos.add(offset);
            
            htmlLabels[id] = { elem: div, localPos: localPos, dir: vector3Dir.clone(), isZ: isZAxis };
        }

        function updateLabelsPosition() {
            const container = document.getElementById('canvasContainer');
            if(!container) return;
            const halfW = container.clientWidth / 2;
            const halfH = container.clientHeight / 2;

            let originProj = targetGroup.position.clone().project(camera);
            let originX = (originProj.x * halfW) + halfW;
            let originY = -(originProj.y * halfH) + halfH;

            let labelData = [];
            for (let key in htmlLabels) {
                let data = htmlLabels[key];
                let worldPos = data.localPos.clone().add(targetGroup.position);
                let vec = worldPos.project(camera);
                
                if (vec.z < 1) { 
                    let tipX = (vec.x * halfW) + halfW;
                    let tipY = -(vec.y * halfH) + halfH;
                    
                    let dx = tipX - originX;
                    let dy = tipY - originY;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    let nx = 0;
                    let ny = 0;
                    let pushDist = 30; // base outward push from the tip
                    
                    if (dist > 0.001) {
                        nx = dx / dist;
                        ny = dy / dist;
                    }
                    
                    if (dist < 0.001 || data.isZ) {
                        // For Z-axis symbols, push them out radially to top-left to avoid overlaps
                        nx = -0.707;
                        ny = -0.707;
                        pushDist = 45; 
                    }
                    
                    labelData.push({
                        elem: data.elem,
                        targetX: tipX + nx * pushDist,
                        targetY: tipY + ny * pushDist
                    });
                } else {
                    data.elem.style.display = 'none';
                }
            }

            // Physics Engine: Anti-collision repulsive force between labels
            for (let iter = 0; iter < 10; iter++) {
                for (let i = 0; i < labelData.length; i++) {
                    for (let j = i + 1; j < labelData.length; j++) {
                        let d1 = labelData[i];
                        let d2 = labelData[j];
                        
                        let dx = d2.targetX - d1.targetX;
                        let dy = d2.targetY - d1.targetY;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        
                        let minDist = 75; // Minimum required distance to ensure legible HTML text
                        
                        if (dist < minDist && dist > 0.001) {
                            let overlap = minDist - dist;
                            let pushX = (dx / dist) * (overlap / 2);
                            let pushY = (dy / dist) * (overlap / 2);
                            
                            d1.targetX -= pushX;
                            d1.targetY -= pushY;
                            d2.targetX += pushX;
                            d2.targetY += pushY;
                        } else if (dist <= 0.001) {
                            // If exactly identical, perturb them
                            d1.targetY -= 5;
                            d2.targetY += 5;
                        }
                    }
                }
            }

            // Apply finalized coordinates to DOM with bounding box constraints
            labelData.forEach(data => {
                let x = data.targetX;
                let y = data.targetY;
                
                let pw = data.elem.offsetWidth || 60;
                let ph = data.elem.offsetHeight || 30;

                // Center line of the container: 48% ensures labels never bleed into the right half (the hand area)
                let centerLine = container.clientWidth * 0.48;

                let minX = pw / 2 + 10;
                let maxX = centerLine - pw / 2;
                if (minX > maxX) minX = maxX; 

                let minY = ph / 2 + 10;
                let maxY = container.clientHeight - ph / 2 - 10;

                x = Math.max(minX, Math.min(maxX, x));
                y = Math.max(minY, Math.min(maxY, y));

                data.elem.style.display = 'flex';
                data.elem.style.left = x + 'px';
                data.elem.style.top = y + 'px';
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const container = document.getElementById('canvasContainer');
            if (container && renderer) {
                const w = container.clientWidth;
                const h = container.clientHeight;
                if (w > 0 && h > 0 && (camera.userData.lastWidth !== w || camera.userData.lastHeight !== h)) {
                    updateCameraPosition();
                }
            }

            if (isAnimatingHand && targetQuaternion) {
                handGroup.quaternion.slerp(targetQuaternion, 0.1);
                if (handGroup.quaternion.angleTo(targetQuaternion) < 0.01) {
                    handGroup.quaternion.copy(targetQuaternion);
                    isAnimatingHand = false;
                }
            }

            updateLabelsPosition();
            if (scene && camera) renderer.render(scene, camera);
        }

        function updateScoreDisplay() {
            if (els.scoreValue) {
                els.scoreValue.innerText = score;
                els.scoreValue.style.transform = 'scale(1.2)';
                els.scoreValue.style.color = '#fde047';
                setTimeout(() => {
                    els.scoreValue.style.transform = 'scale(1)';
                    els.scoreValue.style.color = 'white';
                }, 300);
            }
        }

        function checkZeroForce() {
            if (solved) {
                generateQuestion();
                return;
            }
            if (hiddenKey === 'F' && currentAngleToI === 0) {
                solved = true;
                score += 10;
                updateScoreDisplay();
                
                showToast(DICT[lang].toastSuccess, 'success');
                handGroup.quaternion.normalize();
                targetQuaternion = currentTargetQ.clone();
                isAnimatingHand = true;
                
                if(crossGroup) crossGroup.visible = true;
                createHtmlLabel(hiddenKey, new THREE.Vector3(0,0,0), DICT[lang].lblFound.replace('%s', `<i>F</i> = 0`), vectorColorsStr[hiddenKey]);
                updateUI();
            } else {
                score = Math.max(0, score - 1);
                updateScoreDisplay();
                showToast(DICT[lang].toastFail, 'error');
            }
        }

        function checkAnswer() {
            if (solved) {
                generateQuestion();
                return;
            }

            if (hiddenKey === 'F' && currentAngleToI === 0) {
                score = Math.max(0, score - 1);
                updateScoreDisplay();
                showToast(DICT[lang].toastFail, 'error'); 
                return;
            }

            handGroup.quaternion.normalize();
            const uF = baseVec.F.clone().applyQuaternion(handGroup.quaternion).normalize();
            const uB = baseVec.B.clone().applyQuaternion(handGroup.quaternion).normalize();
            const uI = baseVec.I.clone().applyQuaternion(handGroup.quaternion).normalize();

            if (uF.dot(targetState.F) > 0.85 && uB.dot(targetState.B_perp) > 0.85 && uI.dot(targetState.I) > 0.85) {
                solved = true; 
                score += 10; 
                updateScoreDisplay();
                
                targetQuaternion = currentTargetQ.clone();
                isAnimatingHand = true;

                showToast(DICT[lang].toastSuccess, 'success');

                targetGroup.add(createTargetVector(targetState[hiddenKey], vectorColorsHex[hiddenKey], currentOffsets[hiddenKey]));
                createHtmlLabel(hiddenKey, targetState[hiddenKey], DICT[lang].lblFound.replace('%s', `<i>${hiddenKey}</i>`), vectorColorsStr[hiddenKey], currentOffsets[hiddenKey]);
                
                updateUI();
            } else {
                score = Math.max(0, score - 1);
                updateScoreDisplay();
                showToast(DICT[lang].toastFail, 'error');
            }
        }

        function skipQuestion() {
            if (solved) return;
            solved = true;
            score = Math.max(0, score - 5);
            updateScoreDisplay();
            
            handGroup.quaternion.normalize();
            targetQuaternion = currentTargetQ.clone();
            isAnimatingHand = true;

            if (currentAngleToI === 0 && hiddenKey === 'F') {
                showToast(DICT[lang].toastSkipZero, 'error');
                if(crossGroup) crossGroup.visible = true;
                createHtmlLabel(hiddenKey, new THREE.Vector3(0,0,0), DICT[lang].lblFound.replace('%s', `<i>F</i> = 0`), vectorColorsStr[hiddenKey]);
            } else {
                showToast(DICT[lang].toastSkip, 'error');
                targetGroup.add(createTargetVector(targetState[hiddenKey], vectorColorsHex[hiddenKey], currentOffsets[hiddenKey]));
                createHtmlLabel(hiddenKey, targetState[hiddenKey], DICT[lang].lblFound.replace('%s', `<i>${hiddenKey}</i>`), vectorColorsStr[hiddenKey], currentOffsets[hiddenKey]);
            }

            ['F', 'B', 'I'].forEach(key => {
                const slider = document.getElementById(`slider${key}`);
                if (slider) slider.value = 0;
            });

            updateUI();
        }

        /* --- 5. UI Updates --- */
        function toggleLanguage() { 
            lang = lang === 'en' ? 'zh' : 'en'; 
            updateUI(); 
        }
        
        function getDirName(vec, key) { 
            const d = DICT[lang]; 
            if (key === 'B' && currentAngleToI !== 90 && currentAngleToI !== 0) {
                return d.dirAngle.replace('%a', currentAngleToI);
            }
            if(vec.x > 0.5) return d.dirRight; if(vec.x < -0.5) return d.dirLeft;
            if(vec.y > 0.5) return d.dirUp; if(vec.y < -0.5) return d.dirDown;
            if(vec.z > 0.5) return d.dirOut; if(vec.z < -0.5) return d.dirIn;
            return "---"; 
        }

        function updateUI() {
            const d = DICT[lang];
            
            if (els.appTitle) els.appTitle.innerText = d.title; 
            if (els.appSubtitle) els.appSubtitle.innerText = d.subtitle;
            if (els.scoreLabel) els.scoreLabel.innerHTML = `<svg class="w-4 h-4 text-yellow-300" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg> ${d.scoreLabel}`; 
            if (els.objectiveText) els.objectiveText.innerText = d.objective;
            if (els.givenVectorsTitle) els.givenVectorsTitle.innerText = d.givenTitle; 
            if (els.controlsTitle) els.controlsTitle.innerText = d.controlsTitle; 
            if (els.dragHintText) els.dragHintText.innerText = d.dragHint;
            if (els.slThumb) els.slThumb.innerText = d.slThumb; 
            if (els.slIndex) els.slIndex.innerText = d.slIndex; 
            if (els.slMiddle) els.slMiddle.innerText = d.slMiddle;
            if (els.btnReset) els.btnReset.innerText = d.btnReset;
            if (els.btnZero) els.btnZero.innerHTML = d.btnZero;
            if (els.modalTitle) els.modalTitle.innerText = d.modalTitle; 
            if (els.modalText) els.modalText.innerHTML = d.modalText;
            if (els.modalCloseBtn) els.modalCloseBtn.innerText = d.modalBtn; 
            if (els.footerText) els.footerText.innerText = d.footer;

            if (solved) {
                if (els.btnZero) els.btnZero.style.display = 'none';
                if (els.btnSkip) els.btnSkip.style.display = 'none';
                if (els.btnCheck) {
                    els.btnCheck.className = "w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-600/30 transition transform btn-press flex justify-center items-center text-sm";
                    els.btnCheck.innerText = d.btnNext;
                }
            } else {
                if (els.btnZero) els.btnZero.style.display = 'flex';
                if (els.btnSkip) els.btnSkip.style.display = 'block';
                if (els.btnSkip) els.btnSkip.innerText = d.btnSkip; 
                if (els.btnCheck) {
                    els.btnCheck.className = "w-2/3 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-lg shadow-emerald-600/30 transition transform btn-press flex justify-center items-center text-sm";
                    els.btnCheck.innerText = d.btnCheck;
                }
            }

            if (matPalm && matBack) {
                matPalm.map.dispose();
                matBack.map.dispose();
                matPalm.map = createHandTexture('palm');
                matBack.map = createHandTexture('back');
                matPalm.needsUpdate = true;
                matBack.needsUpdate = true;
            }

            for (let key in htmlLabels) {
                if (solved && key === hiddenKey) {
                    htmlLabels[key].elem.innerHTML = currentAngleToI === 0 ? d.lblFound.replace('%s', `<i>F</i> = 0`) : d.lblFound.replace('%s', `<i>${key}</i>`);
                } else {
                    htmlLabels[key].elem.innerHTML = `${d.lblTarget} <i>${key}</i>`;
                }
            }

            if (els.targetVectorsList) {
                els.targetVectorsList.innerHTML = '';
                ['F','B','I'].forEach(key => {
                    if(key !== hiddenKey && !(key === 'F' && currentAngleToI === 0)) {
                        const colorStr = vectorColorsStr[key];
                        els.targetVectorsList.insertAdjacentHTML('beforeend', `
                        <div class="flex items-center justify-between bg-slate-50 p-2.5 rounded-lg border border-slate-100 shadow-sm">
                            <div class="flex items-center gap-3">
                                <span class="w-3.5 h-3.5 rounded-full shadow-inner" style="background-color: ${colorStr};"></span>
                                <span class="font-bold text-base" style="color: ${colorStr};"><i>${key}</i></span>
                            </div>
                            <span class="font-mono bg-white px-3 py-1 rounded-md text-slate-600 shadow-[0_1px_3px_rgba(0,0,0,0.05)] border border-slate-200 whitespace-nowrap tracking-wide text-sm flex items-center">
                                ${getDirName(targetState[key], key)}
                            </span>
                        </div>`);
                    }
                });
            }
            if(window.MathJax && typeof window.MathJax.typesetPromise === 'function' && els.targetVectorsList) {
                window.MathJax.typesetPromise([els.targetVectorsList, els.modalText]).catch(console.log);
            }
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            if(!t) return;
            document.getElementById('toastMessage').innerText = msg;
            t.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl shadow-lg z-40 transition-all duration-300 flex items-center gap-2 text-white font-bold opacity-100 translate-y-0 ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`;
            document.getElementById('toastIcon').innerHTML = type === 'success' ? '✅' : '❌';
            setTimeout(() => { t.classList.replace('opacity-100', 'opacity-0'); t.classList.replace('translate-y-0', 'translate-y-[-20px]'); }, 2500);
        }

        function toggleModal(show) {
            const m = document.getElementById('helpModal'), c = document.getElementById('helpModalContent');
            if(!m || !c) return;
            if(show) { m.classList.remove('hidden'); requestAnimationFrame(() => { m.classList.remove('opacity-0'); c.classList.replace('scale-95', 'scale-100'); }); }
            else { m.classList.add('opacity-0'); c.classList.replace('scale-100', 'scale-95'); setTimeout(() => m.classList.add('hidden'), 300); }
        }
    </script>
</body>
</html>
